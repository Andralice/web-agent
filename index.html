                    );
                    if (!merged.ok) {
                        showMessage(merged.message, 'warning');
                        return;
                    }
                    if (Object.keys(merged.payload).length === 0) {
                        showMessage('请至少选择一项文风微参，或填写 narrative JSON，或选择叙事物理 M6，或点击「清空微参」', 'warning');
                        return;
                    }
                    actions.writingStyleParamsUpdating = true;
                    try {

                        showErrorMessage(error, '保存文风微参失败');
                    } finally {
                        actions.writingStyleParamsUpdating = false;
                    }
                };

                const submitWritingStyleParamsClear = async () => {
                    if (!currentNovel.value) return;
                    actions.writingStyleParamsUpdating = true;
                    try {
                        await axiosInstance.post(`/${currentNovel.value.id}/writing-style-params`, { writingStyleParams: {} });
                        pipelineForm.value.writingStyleHints = emptyWritingStyleHints();
                        pipelineForm.value.narrativeJson = '';
                        pipelineForm.value.narrativePhysicsMode = '';
                        await fetchPipeline(currentNovel.value.id);
                        showMessage('已清空文风微参');
                    } catch (error) {
                        showErrorMessage(error, '清空文风微参失败');
                    } finally {
                        actions.writingStyleParamsUpdating = false;
                    }
                };

                const formatGenerationTaskRange = (row) => {
                    if (!row || typeof row !== 'object') return '-';
                    const tt = String(row.taskType || row.type || '').toUpperCase();
                    if (tt.includes('OUTLINE_REGENERATE')) {
                        const st = normTaskStatus(row);
                        return `大纲重写占位 · ${st || '进行中'}（非章节 worker，勿点执行）`;
                    }
                    const parts = [];
                    const r1 = row.rangeFrom ?? row.startChapter ?? row.writeRangeFrom;
                    const r2 = row.rangeTo ?? row.endChapter ?? row.writeRangeTo;
                    if (r1 != null && r2 != null) parts.push(`${r1}-${r2}`);
                    const tc = row.targetChapter ?? row.currentChapter ?? row.writeCursorChapter;
                    if (tc != null) parts.push(`进度 ${tc}`);
                    const msg = row.message || row.errorMessage || row.lastError;
                    if (msg && String(msg).length < 80) parts.push(String(msg));
                    return parts.length ? parts.join(' · ') : '-';
                };

                const normTaskStatus = (row) => String(row?.status || row?.state || '').toUpperCase();

                /** 写作任务弹窗不展示已成功结束的任务（失败/取消等仍保留以便重试） */
                const isGenerationTaskSuccessfullyCompleted = (row) => {
                    if (row?._syntheticFromWorkbench) return false;
                    const s = normTaskStatus(row);
                    if (!s) return false;
                    const terminalOk = ['COMPLETED', 'COMPLETE', 'DONE', 'FINISHED', 'SUCCESS', 'SUCCEEDED', 'OK'];
                    if (terminalOk.includes(s)) return true;
                    if (s.includes('SUCCESS')) return true;
                    const raw = String(row?.status || row?.state || '');
                    if (/已完成|成功完成|写入完成/.test(raw)) return true;
                    if (s.includes('完成') && !/未完成|待完成/.test(raw)) return true;
                    return false;
                };

                const filterGenerationTasksHideCompleted = (list) =>
                    (Array.isArray(list) ? list : []).filter((row) => !isGenerationTaskSuccessfullyCompleted(row));

                const generationTaskRowId = (row) => row?.id ?? row?.taskId;

                const canKickTask = (row) => {
                    const tt = String(row?.taskType || row?.type || '').toUpperCase();
                    if (tt.includes('OUTLINE_REGENERATE')) return false;
                    if (row?._syntheticFromWorkbench && (generationTaskRowId(row) == null || generationTaskRowId(row) === '')) return false;
                    return normTaskStatus(row) === 'PENDING';
                };
                const canCancelTask = (row) => {
                    if (row?._syntheticFromWorkbench && (generationTaskRowId(row) == null || generationTaskRowId(row) === '')) return false;
                    return ['PENDING', 'RUNNING'].includes(normTaskStatus(row));
                };
                const canRetryTask = (row) => {
                    if (row?._syntheticFromWorkbench) return false;
                    return ['FAILED', 'CANCELLED', 'CANCELED'].includes(normTaskStatus(row));
                };

                const refreshNovelGenerationTasks = async (options = {}) => {
                    if (!currentNovel.value) return;
                    const silent = !!options.silent;
                    const novelId = currentNovel.value.id;
                    if (!silent) loading.generationTasksList = true;
                    try {
                        await fetchWritingMonitor(novelId, { silent: true });
                        const res = await axiosInstance.get(`/${novelId}/generation-tasks`);
                        let list = normalizeGenerationTasksPayload(res.data);
                        list = mergeGenerationTasksWithWorkbenchContinue(list);
                        novelGenerationTasks.value = filterGenerationTasksHideCompleted(list);
                    } catch (error) {
                        if (!silent) showErrorMessage(error, '获取任务列表失败');
                        novelGenerationTasks.value = [];
                    } finally {
                        if (!silent) loading.generationTasksList = false;
                    }
                };

                const openGenerationTasksDialog = async () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    generationTasksDialogVisible.value = true;
                    await refreshNovelGenerationTasks();
                };

                const postTaskAction = async (taskId, pathSuffix) => {
                    await axiosInstance.post(`/tasks/${taskId}/${pathSuffix}`, {});
                };

                const kickGenerationTask = async (row) => {
                    const taskId = row?.id ?? row?.taskId;
                    if (taskId == null) return;
                    try {
                        await postTaskAction(taskId, 'kick');
                        showMessage('已触发任务执行');
                        await refreshNovelGenerationTasks();
                    } catch (error) {
                        showErrorMessage(error, '触发执行失败');
                    }
                };

                const cancelGenerationTask = async (row) => {
                    const taskId = row?.id ?? row?.taskId;
                    if (taskId == null) return;
                    if (!currentNovel.value) return;
                    const novelId = currentNovel.value.id;
                    try {
                        await postTaskAction(taskId, 'cancel');
                        showMessage('任务已取消');
                        await Promise.all([refreshNovelGenerationTasks(), fetchRegenerationTasks(novelId, { silent: true }), refreshGenerationState()]);
                    } catch (error) {
                        showErrorMessage(error, '取消任务失败');
                    }
                };

                const retryGenerationTask = async (row) => {
                    const taskId = row?.id ?? row?.taskId;
                    if (taskId == null) return;
                    try {
                        await postTaskAction(taskId, 'retry');
                        showMessage('任务已重新排队');
                        await refreshNovelGenerationTasks();
                    } catch (error) {
                        if (isTaskConflictError(error)) {
                            await refreshNovelGenerationTasks();
                            showMessage('与其他活跃任务区间冲突，请稍后或先取消占用中的任务', 'warning');
                            return;
                        }
                        showErrorMessage(error, '重试任务失败');
                    }
                };

                const submitCreate = async () => {
                    if (!form.value.topic.trim()) { showMessage('请输入小说题材', 'warning'); return; }
                    const styleMerge = validateAndMergeWritingStyleParams(
                        form.value.writingStyleHints,
                        form.value.writingStyleNarrativeJson,
                        form.value.writingStyleNarrativePhysicsMode
                    );
                    if (!styleMerge.ok) {
                        showMessage(styleMerge.message, 'warning');
                        return;
                    }
                    actions.creating = true;
                    try {
                        const existingNovelIds = new Set(novels.value.map(n => n.id));
                        const payload = buildCreateNovelPayload(styleMerge.payload);
                        const style = String(form.value.style || '').trim();
                        const styleSeg = novelStyleUrlSegment(style);
                        const createRes = style
                            ? await axiosInstance.post(`/${encodeURIComponent(styleSeg)}/create`, payload, { baseURL: `${apiBase.value}/api/novel-style` })
                            : await axiosInstance.post('/create', payload);
                        dialogVisible.value = false;
                        const created = createRes.data?.data || createRes.data || {};
                        const createdTaskId = created.taskId;
                        showMessage(createdTaskId != null ? `创作任务已提交，任务编号 ${createdTaskId}，请稍后刷新进度` : '创作任务已提交，请稍后手动刷新进度查看结果');
                        const createdId = created.id || created.novelId;
                        const targetNovel = await waitForCreatedNovel(existingNovelIds, createdId);
                        if (targetNovel) await selectNovel(targetNovel);
                        else showMessage('任务已提交，暂未在列表中发现新作品，请稍后手动刷新', 'warning');
                    } catch (error) {
                        if (isTaskConflictError(error)) {
                            showMessage(error.response?.data?.message || '与现有生成任务冲突，请稍后重试或先取消占用中的任务', 'warning');
                            return;
                        }
                        showErrorMessage(error, '创建小说失败');
                    } finally { actions.creating = false; }
                };

                const openRangeRegenerateDialog = () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    const chapter = currentChapter.value;
                    const n = chapter?.chapterNumber != null ? Number(chapter.chapterNumber) : null;
                    if (n != null && !Number.isNaN(n)) {
                        rangeRegenerateForm.value = {
                            startChapter: n,
                            endChapter: n,
                            generationSetting: String(chapter.generationSetting || '').trim()
                        };
                    } else {
                        rangeRegenerateForm.value = { startChapter: null, endChapter: null, generationSetting: '' };
                    }
                    rangeRegenerateDialogVisible.value = true;
                    fetchRegenerationTasks(currentNovel.value.id);
                };

                const fetchRegenerationTasks = async (novelId, options = {}) => {
                    if (!novelId) return;
                    const silent = !!options.silent;
                    if (!silent) loading.regenerationTasks = true;
                    try {
                        const res = await axiosInstance.get(`/${novelId}/regeneration-tasks`);
                        /** 切换书本后旧请求的响应不得覆盖当前书的状态（否则会显示「正在区间重生」串书） */
                        if (currentNovel.value?.id !== novelId) return;
                        const data = res.data?.data || res.data || {};
                        const nextChapterStatusMap = {};
                        const isRunningStatus = (value) => {
                            const text = String(value || '').toLowerCase();
                            if (!text) return true;
                            return /running|processing|pending|queue|rewrit|regenerat|重写|重生|处理中|排队|执行中/.test(text);
                        };
                        const markChapterRunning = (input, defaultStatus = '重写中') => {
                            const chapterNumber = Number(input?.chapterNumber ?? input?.chapter ?? input);
                            if (!chapterNumber) return;
                            const rawStatus = String(input?.status || input?.state || input?.taskStatus || defaultStatus).trim();
                            if (Object.prototype.hasOwnProperty.call(input || {}, 'running') && !input.running) return;
                            if (!isRunningStatus(rawStatus)) return;
                            nextChapterStatusMap[chapterNumber] = rawStatus || defaultStatus;
                        };
                        const statusSources = [
                            data.runningChapters,
                            data.chapters,
                            data.chapterTasks,
                            data.tasks
                        ];
                        statusSources.forEach((items) => {
                            if (Array.isArray(items)) items.forEach(item => markChapterRunning(item));
                        });
                        if (Array.isArray(data.runningChapterNumbers)) {
                            data.runningChapterNumbers.forEach(chapterNumber => markChapterRunning(chapterNumber));
                        }
                        const chapterStatusMap = data.chapterStatuses || data.chapterStatusMap || data.chapterStatus;
                        if (chapterStatusMap && typeof chapterStatusMap === 'object' && !Array.isArray(chapterStatusMap)) {
                            Object.keys(chapterStatusMap).forEach((key) => {
                                const chapterNumber = Number(key);
                                if (!chapterNumber) return;
                                const value = chapterStatusMap[key];
                                const rawStatus = typeof value === 'object'
                                    ? String(value?.status || value?.state || value?.taskStatus || '').trim()
                                    : String(value || '').trim();
                                if (!isRunningStatus(rawStatus)) return;
                                nextChapterStatusMap[chapterNumber] = rawStatus || '重写中';
                            });
                        }
                        regenerationTaskStatus.value = {
                            novelId,
                            hasRunningTask: !!data.hasRunningTask,
                            runningRanges: Array.isArray(data.runningRanges) ? data.runningRanges : []
                        };
                        const wb = data.persistedWorkbench || {};
                        if (wb && typeof wb === 'object') {
                            writingMonitorStatus.value = {
                                ...writingMonitorStatus.value,
                                novelId,
                                writePhase: String(wb.writePhase || writingMonitorStatus.value.writePhase || ''),
                                writeCursorChapter: wb.writeCursorChapter ?? writingMonitorStatus.value.writeCursorChapter ?? null,
                                writeRangeFrom: wb.writeRangeFrom ?? writingMonitorStatus.value.writeRangeFrom ?? null,
                                writeRangeTo: wb.writeRangeTo ?? writingMonitorStatus.value.writeRangeTo ?? null,
                                isBusyPersisted: typeof wb.isBusyPersisted === 'boolean' ? wb.isBusyPersisted : !!writingMonitorStatus.value.isBusyPersisted
                            };
                        }
                        regenerationChapterStatusMap.value = nextChapterStatusMap;
                    } catch (error) {
                        if (!silent && currentNovel.value?.id === novelId) showErrorMessage(error, '获取区间重生任务状态失败');
                    } finally {
                        if (!silent && currentNovel.value?.id === novelId) loading.regenerationTasks = false;
                    }
                };
                const formatWritePhaseLabel = (phase) => {
                    const key = String(phase || '').toUpperCase();
                    if (!key) return '写作中';
                    if (key.includes('REGENERAT')) return '重写中';
                    if (key.includes('CONTINUE')) return '续写中';
                    if (key.includes('WRIT')) return '写作中';
                    if (key.includes('QUEUE') || key.includes('PENDING')) return '排队中';
                    return key;
                };
                const fetchWritingMonitor = async (novelId, options = {}) => {
                    if (!novelId) return;
                    const silent = !!options.silent;
                    try {
                        const res = await axiosInstance.get(`/${novelId}/writing-monitor`);
                        if (currentNovel.value?.id !== novelId) return;
                        const data = res.data?.data || res.data || {};
                        const persistedWorkbench = data.persistedWorkbench && typeof data.persistedWorkbench === 'object'
                            ? data.persistedWorkbench
                            : null;
                        const effective = persistedWorkbench || data;
                        const writePhase = String(data.writePhase || '');
                        const marks = Array.isArray(data.chaptersWithActiveWriteMarks)
                            ? data.chaptersWithActiveWriteMarks
                            : [];
                        writingMonitorStatus.value = {
                            novelId,
                            writePhase: String(effective.writePhase || writePhase || ''),
                            writeCursorChapter: effective.writeCursorChapter ?? data.writeCursorChapter ?? writingMonitorStatus.value.writeCursorChapter ?? null,
                            writeRangeFrom: effective.writeRangeFrom ?? data.writeRangeFrom ?? writingMonitorStatus.value.writeRangeFrom ?? null,
                            writeRangeTo: effective.writeRangeTo ?? data.writeRangeTo ?? writingMonitorStatus.value.writeRangeTo ?? null,
                            activeTaskId: data.activeTaskId ?? effective.activeTaskId ?? null,
                            activeTaskStatus: String(data.activeTaskStatus ?? effective.activeTaskStatus ?? '').trim(),
                            activeTaskCurrentChapter: data.activeTaskCurrentChapter ?? effective.activeTaskCurrentChapter ?? null,
                            isBusyPersisted: typeof effective.isBusyPersisted === 'boolean' ? effective.isBusyPersisted : !!data.isBusyPersisted,
                            volatileGuardRanges: Array.isArray(data.volatileGuardRanges) ? data.volatileGuardRanges : [],
                            chaptersWithActiveWriteMarks: marks
                        };
                        const nextMap = {};
                        const fallbackLabel = formatWritePhaseLabel(writingMonitorStatus.value.writePhase);
                        marks.forEach((item) => {
                            const chapterNumber = Number(item?.chapterNumber ?? item?.chapter ?? item);
                            if (!chapterNumber) return;
                            const label = String(item?.status || item?.state || item?.mark || fallbackLabel || '写作中').trim();
                            nextMap[chapterNumber] = label || '写作中';
                        });
                        writingMonitorChapterStatusMap.value = nextMap;
                    } catch (error) {
                        if (!silent && currentNovel.value?.id === novelId) showErrorMessage(error, '获取写作监控状态失败');
                    }
                };
                const startRegenerationTaskPolling = (novelId) => {
                    stopRegenerationTaskPolling();
                    if (!novelId) return;
                    fetchRegenerationTasks(novelId, { silent: true });
                    fetchWritingMonitor(novelId, { silent: true });
                    regenerationTaskTimer = setInterval(() => {
                        if (!currentNovel.value || currentNovel.value.id !== novelId) return;
                        fetchRegenerationTasks(novelId, { silent: true });
                        fetchWritingMonitor(novelId, { silent: true });
                    }, 3000);
                };

                const waitForRangeRegenerationFinished = async (novelId) => {
                    for (let i = 0; i < 80; i++) {
                        await fetchRegenerationTasks(novelId);
                        if (!regenerationTaskStatus.value.hasRunningTask) return true;
                        await new Promise(resolve => setTimeout(resolve, 2500));
                    }
                    return false;
                };

                const submitRangeRegenerate = async () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    const novelId = currentNovel.value.id;
                    if (rangeRegenerateForm.value.startChapter == null || rangeRegenerateForm.value.endChapter == null) {
                        showMessage('请填写起始章节和结束章节', 'warning');
                        return;
                    }
                    const startChapter = Number(rangeRegenerateForm.value.startChapter);
                    const endChapter = Number(rangeRegenerateForm.value.endChapter);
                    if (!startChapter || !endChapter) {
                        showMessage('请填写有效的章节号', 'warning');
                        return;
                    }
                    actions.rangeRegenerating = true;
                    try {
                        await fetchRegenerationTasks(novelId);
                        if (regenerationTaskStatus.value.hasRunningTask) {
                            showMessage(`当前已有重生任务运行中：${regenerationTaskStatus.value.runningRanges.join(', ') || '未知区间'}`, 'warning');
                            return;
                        }
                        const setting = (rangeRegenerateForm.value.generationSetting || '').trim();
                        const singleChapter = startChapter === endChapter;
                        if (singleChapter) {
                            const payload = setting ? { generationSetting: setting } : {};
                            const regRes = await axiosInstance.post(`/${novelId}/chapters/${startChapter}/regenerate`, payload);
                            rangeRegenerateDialogVisible.value = false;
                            const tid = (regRes.data?.data || regRes.data || {}).taskId;
                            showMessage(tid != null ? `第 ${startChapter} 章重生已排队，任务编号 ${tid}` : `第 ${startChapter} 章重生任务已提交，请稍后刷新进度`);
                            await refreshGenerationState();
                            return;
                        }
                        const payload = { startChapter, endChapter };
                        if (setting) payload.generationSetting = setting;
                        const rrRes = await axiosInstance.post(`/${novelId}/chapters/regenerate-range`, payload);
                        rangeRegenerateDialogVisible.value = false;
                        const tid = (rrRes.data?.data || rrRes.data || {}).taskId;
                        showMessage(tid != null ? `区间重生已排队，任务编号 ${tid}，正在自动跟踪状态` : '区间重生任务已提交，正在自动跟踪任务状态');
                        const finished = await waitForRangeRegenerationFinished(novelId);
                        await Promise.all([
                            fetchChapters(novelId),
                            fetchChapterFacts(novelId),
                            fetchPlotSnapshots(novelId),
                            refreshGenerationState()
                        ]);
                        if (!finished) showMessage('区间重生仍在执行中，可稍后刷新查看最新结果', 'warning');
                    } catch (error) {
                        if (isTaskConflictError(error)) {
                            await fetchRegenerationTasks(novelId);
                            await refreshNovelGenerationTasks({ silent: true });
                            showMessage('与其他活跃任务冲突，请等待当前任务结束或到「写作任务」取消后再试', 'warning');
                            return;
                        }
                        const errorCode = String(error?.response?.data?.code || '').toUpperCase();
                        const errorMessage = String(error?.response?.data?.message || error?.message || '');
                        const conflictDetected =
                            errorCode === 'REGENERATE_RANGE_TASK_FAILED' ||
