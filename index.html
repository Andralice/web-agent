<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文创作台</title>
    <link rel="stylesheet" href="./node_modules/element-plus/dist/index.css" />
</head>
<body>
    <div id="app"></div>

    <script src="./node_modules/vue/dist/vue.global.prod.js"></script>
    <script src="./node_modules/element-plus/dist/index.full.min.js"></script>
    <script src="./node_modules/axios/dist/axios.min.js"></script>
    <script>
        const { createApp, ref, reactive, computed, onMounted, onBeforeUnmount } = Vue;

        const App = {
            template: `
                <div class="app-shell">
                    <header class="titlebar">
                        <div class="titlebar-left">
                            <div class="app-mark">中</div>
                            <div class="titlebar-text">
                                <div class="app-name">中文创作台</div>
                            </div>
                        </div>
                        <div class="titlebar-center">
                            <span class="current-novel-chip" v-if="currentNovel">{{ currentNovel.title }}</span>
                            <div class="service-cluster">
                                <span class="service-label">服务</span>
                                <el-button-group class="service-switch compact-service-switch">
                                    <el-button size="small" :type="!isCloudServer ? 'primary' : ''" :disabled="!isCloudServer" @click="switchToLocal">本地</el-button>
                                    <el-button size="small" :type="isCloudServer ? 'primary' : ''" :disabled="isCloudServer" @click="switchToCloud">云端</el-button>
                                </el-button-group>
                                <el-tag size="small" :type="connectionStatus.type">{{ connectionStatus.text }}</el-tag>
                                <el-button size="small" plain @click="testConnection" :loading="testing">测试</el-button>
                            </div>
                            <div class="auth-cluster" :title="authClusterHint">
                                <template v-if="authSession.securityEnabled">
                                    <el-tag v-if="authSession.authenticated" size="small" type="success" effect="plain">管理员</el-tag>
                                    <el-tag v-else size="small" type="info" effect="plain">访客</el-tag>
                                </template>
                                <span v-else class="auth-hint-soft">书库开放</span>
                                <el-button v-if="!authSession.authenticated" size="small" plain @click="openLoginDialog">管理员登录</el-button>
                                <el-button v-if="authSession.authenticated || authTokenPresent" size="small" plain @click="logoutAdmin">退出</el-button>
                            </div>
                        </div>
                        <div class="titlebar-actions">
                            <button class="window-btn" @click="minimizeWindow" title="最小化">—</button>
                            <button class="window-btn" @click="maximizeWindow" title="最大化">□</button>
                            <button class="window-btn close" @click="closeWindow" title="关闭">×</button>
                        </div>
                    </header>

                    <div class="workspace">
                        <aside class="sidebar" :class="{ collapsed: sidebarCollapsed }">
                            <div class="sidebar-head" @click="toggleSidebar" title="点击收起/展开导航">
                                <div class="sidebar-logo">{{ sidebarCollapsed ? '中' : '创' }}</div>
                                <div class="sidebar-title" v-show="!sidebarCollapsed">
                                    <div class="sidebar-name">中文创作台</div>
                                    <div class="sidebar-desc">创作平台</div>
                                </div>
                            </div>
                            <el-menu class="nav-menu" :default-active="activeView" @select="handleViewChange">
                                <el-menu-item index="dashboard">
                                    <span class="nav-icon">首</span>
                                    <span class="nav-text">主页</span>
                                </el-menu-item>
                                <el-menu-item index="home">
                                    <span class="nav-icon">创</span>
                                    <span class="nav-text">创作中心</span>
                                </el-menu-item>
                                <el-menu-item index="log">
                                    <span class="nav-icon">监</span>
                                    <span class="nav-text">运行监控</span>
                                </el-menu-item>
                            </el-menu>
                        </aside>

                        <main class="content">
                            <section v-show="activeView === 'dashboard'" class="page dashboard-page" v-loading="loading.dashboard">
                                <div class="dash-hero glass-layer">
                                    <div class="dash-hero-copy">
                                        <span class="dash-eyebrow">工作台 · 数据概览</span>
                                        <h1 class="dash-title">中文创作台</h1>
                                        <p class="dash-lead">浅粉与雾蓝层次的界面下，汇总作品规模、进行中的写作任务与最近活跃的小说。</p>
                                        <div class="dash-hero-actions">
                                            <el-button type="primary" class="dash-btn-primary" size="large" @click="openCreateDialog">新建作品</el-button>
                                            <el-button size="large" class="dash-btn-ghost" @click="activeView = 'home'">进入作品库</el-button>
                                            <el-button size="large" plain class="dash-btn-ghost" @click="refreshDashboardOverview" :loading="loading.dashboard">刷新统计</el-button>
                                        </div>
                                    </div>
                                    <div class="dash-hero-side">
                                        <div class="dash-service-card">
                                            <span class="dash-muted">连接</span>
                                            <el-tag size="small" :type="connectionStatus.type">{{ connectionStatus.text }}</el-tag>
                                            <span class="dash-service-pill">{{ isCloudServer ? '云端节点' : '本地节点' }}</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="dash-stat-grid">
                                    <div class="dash-stat-card glass-layer">
                                        <span class="dash-stat-label">作品总数</span>
                                        <strong class="dash-stat-value">{{ dashboardSummary.totalNovels }}</strong>
                                        <span class="dash-stat-hint">库内小说部数</span>
                                    </div>
                                    <div class="dash-stat-card glass-layer">
                                        <span class="dash-stat-label">章节规模</span>
                                        <strong class="dash-stat-value">{{ dashboardSummary.totalChapters }}</strong>
                                        <span class="dash-stat-hint">最近扫描汇总</span>
                                    </div>
                                    <div class="dash-stat-card glass-layer">
                                        <span class="dash-stat-label">预估字数</span>
                                        <strong class="dash-stat-value dash-stat-value-sm">{{ formatDashboardWords(dashboardSummary.totalWordsEst) }}</strong>
                                        <span class="dash-stat-hint">按章 ×3100 字估算</span>
                                    </div>
                                    <div class="dash-stat-card glass-layer dash-stat-card-accent">
                                        <span class="dash-stat-label">进行中作品</span>
                                        <strong class="dash-stat-value">{{ dashboardSummary.busyNovels }}</strong>
                                        <span class="dash-stat-hint">续写 / 重写 / 新建管线</span>
                                    </div>
                                </div>

                                <div class="dash-section glass-layer">
                                    <div class="dash-section-head">
                                        <h2>正在进行的程序</h2>
                                        <p class="dash-muted">基于近期作品的进度接口抽样（最多约 28 部），用于展示后台忙碌状态。</p>
                                    </div>
                                    <div class="dash-running-grid">
                                        <div class="dash-running-card">
                                            <span class="dash-running-icon dash-ri-cont">续</span>
                                            <div>
                                                <span class="dash-running-title">续写 / 自动续写</span>
                                                <strong class="dash-running-num">{{ dashboardSummary.runningContinue }}</strong>
                                            </div>
                                        </div>
                                        <div class="dash-running-card">
                                            <span class="dash-running-icon dash-ri-reg">重</span>
                                            <div>
                                                <span class="dash-running-title">章节或区间重写</span>
                                                <strong class="dash-running-num">{{ dashboardSummary.runningRegenerate }}</strong>
                                            </div>
                                        </div>
                                        <div class="dash-running-card">
                                            <span class="dash-running-icon dash-ri-new">新</span>
                                            <div>
                                                <span class="dash-running-title">新书生成 / 初始化</span>
                                                <strong class="dash-running-num">{{ dashboardSummary.runningBootstrap }}</strong>
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="dashboardBusyList.length" class="dash-busy-list">
                                        <div v-for="item in dashboardBusyList" :key="item.id" class="dash-busy-row">
                                            <span :class="['dash-busy-dot', 'dot-' + item.bucket]" />
                                            <span class="dash-busy-title">{{ item.title }}</span>
                                            <el-tag size="small" effect="plain" class="dash-busy-tag">{{ item.bucket === 'continue' ? '续写' : item.bucket === 'regenerate' ? '重写' : '新建' }}</el-tag>
                                            <span class="dash-busy-hint">{{ item.hint }}</span>
                                        </div>
                                    </div>
                                    <el-empty v-else description="当前抽样范围内暂无检测到的进行中任务" :image-size="72" />
                                </div>

                                <div class="dash-section glass-layer">
                                    <div class="dash-section-head">
                                        <h2>最近更新的小说</h2>
                                        <p class="dash-muted">按更新时间排序；字数由章节数估算，进入作品后可查看正文。</p>
                                    </div>
                                    <div class="dash-recent-grid">
                                        <article
                                            v-for="(item, idx) in dashboardRecentItems"
                                            :key="item.id"
                                            class="dash-recent-card"
                                            @click="openNovelFromDashboard(item)">
                                            <div :class="['dash-recent-accent', libraryCardAccent(idx)]" />
                                            <div class="dash-recent-top">
                                                <h3>{{ item.title }}</h3>
                                                <span :class="['dash-rec-dot', 's-' + item.statusDot]" :title="item.busyHint || ''" />
                                            </div>
                                            <div class="dash-recent-meta">
                                                <span>{{ item.chapters }} 章</span>
                                                <span class="dash-recent-dot">·</span>
                                                <span>{{ item.wordsLabel }}</span>
                                            </div>
                                            <p v-if="item.platform" class="dash-recent-platform">{{ item.platform }}</p>
                                            <span class="dash-recent-time">{{ item.updatedHint }}</span>
                                        </article>
                                    </div>
                                    <el-empty v-if="!dashboardRecentItems.length && !loading.dashboard" description="暂无作品，请先新建或同步列表" :image-size="80" />
                                </div>
                            </section>

                            <section v-show="activeView === 'home'" class="page">
                                <div class="content-grid">
                                    <el-card v-if="!currentNovel" shadow="never" class="panel library-panel glass-layer">
                                        <template #header>
                                            <div class="panel-header panel-header-library library-shelf-head">
                                                <div class="library-title-block">
                                                    <div class="library-icon">书</div>
                                                    <div class="panel-titleline">
                                                        <span class="panel-title">作品库</span>
                                                        <span class="panel-subtitle">共 {{ novels.length }} 部 · 卡片视图</span>
                                                    </div>
                                                </div>
                                                <div class="library-actions">
                                                    <el-button size="small" round @click="fetchNovels" :loading="loading.novels">刷新</el-button>
                                                    <el-button type="primary" size="small" round @click="openCreateDialog">+ 新建作品</el-button>
                                                </div>
                                            </div>
                                        </template>
                                        <div class="library-card-grid-wrap" v-loading="loading.novels">
                                            <div class="library-card-grid">
                                                <article
                                                    v-for="(row, idx) in novels"
                                                    :key="row.id"
                                                    :class="['library-novel-card', libraryCardAccent(idx)]"
                                                    @click="selectNovel(row)">
                                                    <div class="lnc-shine" />
                                                    <header class="lnc-head">
                                                        <span class="lnc-id">#{{ row.id }}</span>
                                                        <h3 class="lnc-title">{{ row.title || '未命名作品' }}</h3>
                                                    </header>
                                                    <p class="lnc-setting">{{ row.generationSetting || '暂无全局设定摘要' }}</p>
                                                    <footer class="lnc-foot">
                                                        <div class="lnc-meta">
                                                            <span v-if="novelChapterCountFromRow(row)" class="lnc-chip">{{ novelChapterCountFromRow(row) }} 章</span>
                                                            <span v-if="novelChapterCountFromRow(row)" class="lnc-chip lnc-chip-soft">约 {{ formatDashboardWords(estimateWordsFromChapters(novelChapterCountFromRow(row))) }}</span>
                                                            <span v-if="row.serializationPlatform" class="lnc-chip lnc-chip-platform">{{ row.serializationPlatform }}</span>
                                                            <span v-if="authSession.securityEnabled" class="lnc-chip" :class="row.libraryPublic === false ? 'lnc-chip-private' : 'lnc-chip-public'">{{ row.libraryPublic === false ? '仅管理员' : '公共' }}</span>
                                                        </div>
                                                        <div v-if="authSession.securityEnabled && authSession.authenticated" class="lnc-visibility" @click.stop>
                                                            <span class="lnc-vis-label">访客可见</span>
                                                            <el-switch
                                                                size="small"
                                                                :model-value="row.libraryPublic !== false"
                                                                @change="(v) => updateNovelLibraryVisibility(row, v)"
                                                            />
                                                        </div>
                                                        <el-button link type="danger" size="small" class="lnc-del" @click.stop="handleDeleteNovel(row)">删除</el-button>
                                                    </footer>
                                                </article>
                                            </div>
                                            <el-empty v-if="!novels.length && !loading.novels" description="暂无作品，点击上方新建或检查后端连接" :image-size="100" />
                                        </div>
                                    </el-card>

                                    <el-card v-else shadow="hover" class="panel panel-workbench">
                                        <template #header>
                                            <div class="panel-header panel-header-vertical workbench-panel-header">
                                                <div
                                                    class="workbench-title-data-row"
                                                    title="书籍备注：平台与创作说明仅展示；悬停「说明」可看全文">
                                                    <div class="workbench-title-left">
                                                        <div class="panel-title">{{ currentNovel.title }}</div>
                                                        <div class="panel-subtitle">已生成 {{ chapters.length }} 个章节 · 支持续写、审阅与导出</div>
                                                    </div>
                                                    <div class="workbench-data-preview workbench-data-preview-inline">
                                                        <div class="wdp-inline-row">
                                                            <span class="wdp-inline-label">备注速览</span>
                                                            <div class="wdp-inline-main">
                                                                <template v-if="bookMetaDisplayPlatform || bookMetaDisplayNote">
                                                                    <el-tag v-if="bookMetaDisplayPlatform" size="small" effect="plain" class="book-meta-tag book-meta-tag-wdp">平台 {{ bookMetaDisplayPlatform }}</el-tag>
                                                                    <el-tooltip v-if="bookMetaDisplayNote" :content="bookMetaDisplayNote" placement="bottom" :disabled="bookMetaDisplayNote.length <= 80">
                                                                        <span class="book-meta-note-chip book-meta-note-chip-wdp">说明 {{ bookMetaNoteShort }}</span>
                                                                    </el-tooltip>
                                                                </template>
                                                                <span v-else class="wdp-empty-inline">未填写平台 / 说明</span>
                                                            </div>
                                                            <el-button type="primary" link size="small" class="wdp-edit-btn-inline" @click="openStoryInfoDialog('bookMeta')">编辑</el-button>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="workbench-toolbar">
                                                    <div class="toolbar-row">
                                                        <el-button class="toolbar-pill" @click="backToNovelList">← 作品库</el-button>
                                                        <el-button class="toolbar-pill" @click="refreshGenerationState" :loading="loading.progress">刷新进度</el-button>
                                                        <button type="button" class="toolbar-pill" title="查看或编辑：全书设定、连载备注、大纲与角色表" @click="openStoryInfoDialog()">
                                                            创作信息
                                                        </button>
                                                        <button type="button" class="toolbar-pill" title="本书文风类型（如轻小说、爽文），只影响之后新写的章节，不会改已发表正文" @click="openPipelineDialog">
                                                            文风 {{ currentPipelineLabel }}
                                                        </button>
                                                        <span v-if="writingMonitorToolbarText" :class="['toolbar-pill', 'static', writingMonitorToneClass]">{{ writingMonitorToolbarText }}</span>
                                                        <span class="toolbar-pill done static">章节 {{ generationProgress.chapterCount || chapters.length }} 章</span>
                                                        <button v-if="generationProgress.failedCount" type="button" class="toolbar-pill danger" title="点击查看失败日志" @click="openFailureLogs">失败 {{ generationProgress.failedCount }}</button>
                                                        <el-button class="toolbar-pill" title="排队生成下一章，或一次多章自动续写；可写本章写作提要" @click="openContinueDialog" :loading="actions.continuing || actions.autoContinuing">续写</el-button>
                                                        <el-button class="toolbar-pill" title="按起止章号批量重算正文，会覆盖所选范围内的旧稿" @click="openRangeRegenerateDialog()" :disabled="chapters.length === 0" :loading="actions.rangeRegenerating">区间重写</el-button>
                                                        <el-button class="toolbar-pill" @click="copyCurrentChapter" :disabled="!currentChapter || !currentChapter.content">复制本章</el-button>
                                                        <el-button class="toolbar-pill" @click="exportNovel" :disabled="chapters.length === 0" :loading="actions.exporting">导出 TXT</el-button>
                                                        <el-button class="toolbar-pill" title="查看排队、进行中、失败的任务；可取消或重试" @click="openGenerationTasksDialog">写作任务</el-button>
                                                        <el-button class="toolbar-pill" title="导出体检、前后矛盾、章节事实、主线阶段快照及 AI 内部调试数据（按需查看）" @click="openQualityCenterDialog()">质量与调试</el-button>
                                                        <button type="button" :class="['toolbar-pill', compactDialogMode ? 'active' : '']" title="弹窗更紧凑，适合小屏幕" @click="toggleCompactDialogMode">
                                                            紧凑弹窗 {{ compactDialogMode ? '开' : '关' }}
                                                        </button>
                                                        <el-button class="toolbar-pill" @click="refreshChapters" :loading="actions.refreshing">刷新章节</el-button>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>

                                        <div v-if="workbenchMode === 'chapters'" class="workbench" :style="{ gridTemplateColumns: chapterListWidth + 'px 8px minmax(0, 1fr)' }">
                                            <div class="chapter-list">
                                                <el-menu @select="handleChapterSelect" v-loading="loading.chapters" :default-active="currentChapter ? currentChapter.id.toString() : ''">
                                                    <el-empty v-if="chapters.length === 0 && !loading.chapters" description="暂无章节" :image-size="80" />
                                                    <el-menu-item v-for="c in chapters" :index="c.id.toString()" :key="c.id">
                                                        <div class="chapter-item" :class="{ 'is-write-busy': chapterListRowIsCompact(c) }">
                                                            <span class="chapter-number">{{ c.chapterNumber }}</span>
                                                            <template v-if="chapterListShowsTitle(c)">
                                                                <span class="chapter-title">{{ c.title }}</span>
                                                                <el-tag v-if="c.generationSetting" size="small" type="warning" effect="plain">设定</el-tag>
                                                                <el-tag v-if="getChapterListWriteSlot(c) === 'continue_marked'" size="small" type="primary" effect="plain">续写</el-tag>
                                                                <el-tag v-if="getChapterListWriteSlot(c) === 'rewrite_done'" size="small" type="success" effect="plain">已重写</el-tag>
                                                            </template>
                                                            <template v-else>
                                                                <el-tooltip :content="chapterListHintText(c)" placement="right" :show-after="200">
                                                                    <span class="chapter-status-hint">{{ chapterListHintShort(c) }}</span>
                                                                </el-tooltip>
                                                                <span
                                                                    class="chapter-busy-indicator"
                                                                    :class="'tone-' + getChapterListBusyTone(c)"
                                                                    aria-hidden="true"
                                                                ></span>
                                                            </template>
                                                        </div>
                                                    </el-menu-item>
                                                </el-menu>
                                            </div>

                                            <div class="chapter-resizer" @mousedown="startResizeChapterList" title="拖拽调整章节栏宽度"></div>

                                            <div class="reader" ref="readerRef">
                                                <div v-if="currentChapter" class="chapter-content" ref="contentRef">
                                                    <h3 class="chapter-content-title">{{ currentChapter.title }}</h3>
                                                    <div v-if="currentChapterRewriteStatus" class="chapter-rewrite-hint">
                                                        当前章节正在重写（{{ currentChapterRewriteStatus }}）<template v-if="chapterRewriteProgressText">，{{ chapterRewriteProgressText }}</template>，内容会在任务完成后自动更新
                                                    </div>
                                                    <div
                                                        v-if="currentChapter.generationSetting || currentChapterSidecar"
                                                        class="chapter-meta-shell"
                                                    >
                                                        <div class="chapter-meta-row">
                                                            <button
                                                                v-if="currentChapter.generationSetting"
                                                                type="button"
                                                                class="chapter-meta-chip"
                                                                :class="{ 'is-expanded': chapterSettingExpanded }"
                                                                @click="toggleChapterMetaSetting"
                                                            >
                                                                <span class="chapter-meta-chip-main">
                                                                    <span class="chapter-meta-chip-label">本章生成设定</span>
                                                                    <span
                                                                        v-if="!chapterSettingExpanded && chapterSettingPreview"
                                                                        class="chapter-meta-chip-preview"
                                                                    >{{ chapterSettingPreview }}</span>
                                                                </span>
                                                                <span class="chapter-meta-chip-tail">
                                                                    <span class="chapter-meta-chip-action">{{ chapterSettingExpanded ? '收起' : '展开' }}</span>
                                                                    <span :class="['chapter-meta-chip-caret', chapterSettingExpanded ? 'expanded' : '']">⌄</span>
                                                                </span>
                                                            </button>
                                                            <button
                                                                v-if="currentChapterSidecar"
                                                                type="button"
                                                                class="chapter-meta-chip"
                                                                :class="{ 'is-expanded': chapterSidecarExpanded }"
                                                                title="本章提炼出的关键事实与上下章衔接提示，不参与导出正文"
                                                                @click="toggleChapterMetaSidecar"
                                                            >
                                                                <span class="chapter-meta-chip-main">
                                                                    <span class="chapter-meta-chip-label">本章要点</span>
                                                                    <span
                                                                        v-if="!chapterSidecarExpanded && chapterSidecarPreview"
                                                                        class="chapter-meta-chip-preview"
                                                                    >{{ chapterSidecarPreview }}</span>
                                                                </span>
                                                                <span class="chapter-meta-chip-tail">
                                                                    <span class="chapter-meta-chip-action">{{ chapterSidecarExpanded ? '收起' : '展开' }}</span>
                                                                    <span :class="['chapter-meta-chip-caret', chapterSidecarExpanded ? 'expanded' : '']">⌄</span>
                                                                </span>
                                                            </button>
                                                        </div>
                                                        <template v-if="currentChapter.generationSetting">
                                                            <div v-show="chapterSettingExpanded" class="chapter-meta-panel">
                                                                <p class="chapter-meta-panel-prose">{{ currentChapter.generationSetting }}</p>
                                                            </div>
                                                        </template>
                                                        <template v-if="currentChapterSidecar">
                                                            <div v-show="chapterSidecarExpanded" class="chapter-meta-panel">
                                                                <div class="chapter-meta-blocks">
                                                                    <div class="chapter-meta-block">
                                                                        <strong>关键事实</strong>
                                                                        <ul v-if="currentChapterSidecarFacts.length">
                                                                            <li v-for="(fact, idx) in currentChapterSidecarFacts" :key="idx">{{ fact }}</li>
                                                                        </ul>
                                                                        <p v-else class="chapter-meta-muted">暂无关键事实</p>
                                                                    </div>
                                                                    <div class="chapter-meta-block">
                                                                        <strong>衔接锚点</strong>
                                                                        <p class="chapter-meta-panel-prose">{{ currentChapterSidecar.continuityAnchor || '暂无衔接锚点' }}</p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div class="chapter-prose" lang="zh-Hans">

                    if (up === 'CONTINUOUS_MICRO' || up === 'CONTINUOUS') return 'continuous';
                    if (up === 'STRESS_THRESHOLD' || up === 'STRESS') return 'stress';
                    const low = s.toLowerCase();
                    const contHits = ['continuous', 'micro', 'daily', '日常', '连续'];
                    const stressHits = ['stress', 'threshold', 'burst', '压力', '阈值'];
                    if (contHits.some((k) => low === k)) return 'continuous';
                    if (stressHits.some((k) => low === k)) return 'stress';
                    return '';
                };

                const extractNarrativePhysicsModeFromWritingStyleParams = (w) => {
                    let obj = w;
                    if (typeof w === 'string') {
                        try {
                            obj = JSON.parse(w);
                        } catch {

                        }

                    if (!obj || typeof obj !== 'object') return '';

                /** 合并四项枚举、可选 M6 narrativePhysicsMode、可选 narrative JSON；非法 narrative JSON 返回 ok:false */
                const validateAndMergeWritingStyleParams = (hints, narrativeJsonStr, narrativePhysicsMode) => {

                const novelStyleUrlSegmentFromWritingPipeline = (wp) => {

                    const powerAliases = new Set(['power-fantasy', 'power_fantasy', 'powerfantasy', 'pf', 'default', 'shuang', 'shuangwen', '爽文']);
                    if (powerAliases.has(rl)) return 'power-fantasy';

                    const s = raw.toUpperCase().replace(/-/g, '_');

                function createAxiosInstance() {
                    const instance = axios.create({

                        timeout: CONFIG.REQUEST_TIMEOUT,

                    });
                    const validateApiResult = (data) => {
                        if (!data || typeof data !== 'object') return;
                        const hasStatus = Object.prototype.hasOwnProperty.call(data, 'status');
                        const hasCode = Object.prototype.hasOwnProperty.call(data, 'code');
                        if (!hasStatus && !hasCode) return;
                        const statusOk = !hasStatus || String(data.status).toLowerCase() === 'success';
                        const codeOk = !hasCode || String(data.code).toUpperCase() === 'OK';
                        if (statusOk && codeOk) return;
                        const err = new Error(data.message || `接口返回失败: ${data.code || data.status || 'UNKNOWN'}`);
                        err.response = { data };
                        throw err;
                    };

                    instance.interceptors.request.use(config => {
                        const token = localStorage.getItem(CONFIG.STORAGE_AUTH_TOKEN);
                        if (token) {
                            config.headers = config.headers || {};
                            config.headers.Authorization = `Bearer ${token}`;
                        }
                        config.metadata = { startTime: Date.now() };
                        addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                        addLog('🚀 发起请求', 'info');
                        addLog(`   方法: ${(config.method || 'GET').toUpperCase()}`, 'info');
                        addLog(`   URL: ${config.baseURL}${config.url}`, 'info');
                        addLog(`   超时: ${config.timeout}ms`, 'info');
                        if (config.data) addLog(`   请求体: ${JSON.stringify(config.data)}`, 'info');
                        addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                        return config;
                    }, error => {
                        addLog(`❌ 请求配置错误: ${error.message}`, 'error');
                        return Promise.reject(error);
                    });

                    instance.interceptors.response.use(response => {
                        const duration = Date.now() - response.config.metadata.startTime;
                        addLog('✅ 请求成功', 'success');
                        addLog(`   状态码: ${response.status} ${response.statusText}`, 'success');
                        addLog(`   耗时: ${duration}ms`, 'success');
                        addLog(`   数据大小: ${JSON.stringify(response.data).length} 字节`, 'success');
                        addLog(`   数据类型: ${Array.isArray(response.data) ? 'Array' : typeof response.data}`, 'success');
                        if (response.data) {
                            addLog(`   数据预览: ${JSON.stringify(response.data)}`, 'info');
                        }
                        validateApiResult(response.data);
                        return response;
                    }, error => {
                        const duration = error.config?.metadata ? Date.now() - error.config.metadata.startTime : 0;
                        addLog('❌ 请求失败', 'error');
                        addLog(`   耗时: ${duration}ms`, 'error');
                        if (error.code === 'ECONNABORTED') {
                            addLog('   错误类型: 超时 (Timeout)', 'error');
                            addLog(`   超时设置: ${error.config?.timeout || '未知'}ms`, 'error');

                        } else if (error.code === 'ERR_NETWORK' || (error.message || '').includes('Network Error')) {
                            addLog('   错误类型: 网络错误 (Network Error)', 'error');
                            addLog(`   请求地址: ${error.config?.baseURL}${error.config?.url}`, 'error');

                            addLog(`   错误详情: ${JSON.stringify(error.response.data)}`, 'error');
                        } else {
                            addLog('   错误类型: 未知错误', 'error');
                            addLog(`   错误信息: ${error.message}`, 'error');
                        }
                        addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'error');
                        return Promise.reject(error);
                    });

                    return instance;
                }

                function addLog(message, type = 'info') {
                    const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
                    logs.value.push({ id: ++logSequence, time, type, message: String(message || '') });
                    if (logs.value.length > 200) {
                        const removed = logs.value.shift();
                        if (removed?.id) {
                            const next = new Set(expandedLogIds.value);
                            next.delete(removed.id);
                            expandedLogIds.value = next;
                        }
                    }
                    if (activeView.value === 'log' && logContainerRef.value) {
                        setTimeout(() => {
                            logContainerRef.value.scrollTop = logContainerRef.value.scrollHeight;
                        }, 50);
                    }
                }

                function filterLog(type) { logFilter.value = type; }
                function isExpandableLog(message) {
                    const text = String(message || '');
                    return text.length > 120 || text.includes('\n');
                }
                function isLogExpanded(log) {
                    return !!log?.id && expandedLogIds.value.has(log.id);
                }
                function toggleLogExpanded(log) {
                    if (!log?.id) return;
                    const next = new Set(expandedLogIds.value);
                    if (next.has(log.id)) next.delete(log.id);
                    else next.add(log.id);
                    expandedLogIds.value = next;
                }

                function clearLogs() {
                    ElementPlus.ElMessageBox.confirm('确定要清空所有日志吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(() => {
                        logs.value = [];
                        expandedLogIds.value = new Set();
                        addLog('日志已清空', 'info');
                    }).catch(() => {});
                }

                const dashboardSummary = ref({
                    totalNovels: 0,
                    totalChapters: 0,
                    totalWordsEst: 0,
                    runningContinue: 0,
                    runningRegenerate: 0,
                    runningBootstrap: 0,
                    busyNovels: 0
                });
                const dashboardBusyList = ref([]);
                const dashboardRecentItems = ref([]);

                const novelUpdatedTs = (n) => {
                    const raw = n?.updatedAt ?? n?.updated_at ?? n?.modifyTime ?? n?.lastModified ?? n?.createTime ?? n?.createdAt;
                    if (raw) {
                        const ms = new Date(raw).getTime();
                        if (!Number.isNaN(ms)) return ms;
                    }
                    return Number(n?.id) || 0;
                };

                const novelChapterCountFromRow = (n) => {
                    const v = n?.chapterCount ?? n?.chaptersCount ?? n?.chapterNum ?? n?.totalChapters;
                    return Number(v) || 0;
                };

                const estimateWordsFromChapters = (chapters) => {
                    const n = Number(chapters) || 0;
                    return Math.round(n * 3100);
                };

                const formatDashboardWords = (n) => {
                    const v = Number(n) || 0;
                    if (v >= 100000000) return `${(v / 100000000).toFixed(2).replace(/\.?0+$/, '')} 亿字`;
                    if (v >= 10000) return `${(v / 10000).toFixed(1).replace(/\.0$/, '')} 万字`;
                    return `${v.toLocaleString('zh-CN')} 字`;
                };

                const formatRelativeUpdated = (n) => {
                    const ms = novelUpdatedTs(n);
                    if (!ms) return '';
                    const diff = Date.now() - ms;
                    if (diff < 60000) return '刚刚更新';
                    if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
                    if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
                    if (diff < 86400000 * 7) return `${Math.floor(diff / 86400000)} 天前`;
                    return new Date(ms).toLocaleDateString('zh-CN');
                };

                const classifyWritingBucket = (p) => {
                    if (!p || typeof p !== 'object') return 'idle';
                    const pw = p.persistedWorkbench && typeof p.persistedWorkbench === 'object' ? p.persistedWorkbench : {};
                    const phase = String(p.writePhase || pw.writePhase || '').toUpperCase();
                    const gen = String(p.generationStatus || '').toLowerCase();
                    const busy = !!pw.isBusyPersisted || !!p.isBusyPersisted;
                    if (/REGENERAT|REWRIT|RANGE/.test(phase)) return 'regenerate';
                    if (/CONTINUE|AUTO_CONTINUE/.test(phase)) return 'continue';
                    if (/BOOTSTRAP|INITIAL|CREAT/.test(phase)) return 'bootstrap';
                    if (busy || gen === 'generating') return 'bootstrap';
                    return 'idle';
                };

                const dashboardPhaseHint = (p) => {
                    const pw = p?.persistedWorkbench && typeof p.persistedWorkbench === 'object' ? p.persistedWorkbench : {};
                    const phase = String(p?.writePhase || pw.writePhase || '').trim();
                    const ch = p?.chapterCount ?? pw?.writeCursorChapter;
                    if (phase && ch != null) return `${phase} · 约 ${ch} 章`;
                    if (phase) return phase;
                    return String(p?.generationStatus || '进行中');
                };

                const scanDashboardProgress = async () => {
                    const list = Array.isArray(novels.value) ? [...novels.value] : [];
                    let sumChFromList = 0;
                    list.forEach((n) => { sumChFromList += novelChapterCountFromRow(n); });
                    dashboardSummary.value.totalNovels = list.length;
                    dashboardSummary.value.totalChapters = sumChFromList;
                    dashboardSummary.value.totalWordsEst = estimateWordsFromChapters(sumChFromList);

                    const sorted = list.sort((a, b) => novelUpdatedTs(b) - novelUpdatedTs(a));
                    const scanIds = sorted.slice(0, 28).map((n) => n.id);
                    const progressById = {};
                    let runningContinue = 0;
                    let runningRegenerate = 0;
                    let runningBootstrap = 0;
                    const busyAcc = [];

                    const chunk = 7;
                    for (let i = 0; i < scanIds.length; i += chunk) {
                        const part = scanIds.slice(i, i + chunk);
                        const outs = await Promise.all(
                            part.map(async (id) => {
                                try {
                                    const res = await axiosInstance.get(`/${id}/progress`);
                                    return { id, p: res.data?.data || res.data || {} };
                                } catch {
                                    return { id, p: null };
                                }
                            })
                        );
                        outs.forEach(({ id, p }) => {
                            if (!p) return;
                            progressById[id] = p;
                        });
                    }

                    scanIds.forEach((id) => {
                        const p = progressById[id];
                        if (!p) return;
                        const bucket = classifyWritingBucket(p);
                        if (bucket === 'idle') return;
                        if (bucket === 'continue') runningContinue += 1;
                        else if (bucket === 'regenerate') runningRegenerate += 1;
                        else runningBootstrap += 1;
                        const novel = list.find((x) => x.id === id);
                        if (busyAcc.length < 10) {
                            busyAcc.push({
                                id,
                                title: novel?.title || `作品 #${id}`,
                                bucket,
                                hint: dashboardPhaseHint(p)
                            });
                        }
                    });

                    dashboardSummary.value.runningContinue = runningContinue;
                    dashboardSummary.value.runningRegenerate = runningRegenerate;
                    dashboardSummary.value.runningBootstrap = runningBootstrap;
                    dashboardSummary.value.busyNovels = runningContinue + runningRegenerate + runningBootstrap;
                    dashboardBusyList.value = busyAcc;

                    dashboardRecentItems.value = sorted.slice(0, 8).map((n) => {
                        const p = progressById[n.id];
                        const fromProg = p ? Number(p.chapterCount || 0) : 0;
                        const fromRow = novelChapterCountFromRow(n);
                        const chapters = Math.max(fromProg, fromRow);
                        const wordsEst = estimateWordsFromChapters(chapters);
                        const bucket = p ? classifyWritingBucket(p) : 'idle';
                        let statusDot = 'idle';
                        if (bucket === 'continue') statusDot = 'continue';
                        else if (bucket === 'regenerate') statusDot = 'regenerate';
                        else if (bucket === 'bootstrap') statusDot = 'bootstrap';
                        return {
                            id: n.id,
                            title: n.title || `未命名 #${n.id}`,
                            chapters,
                            wordsEst,
                            wordsLabel: formatDashboardWords(wordsEst),
                            updatedHint: formatRelativeUpdated(n),
                            platform: (n.serializationPlatform || '').trim(),
                            statusDot,
                            busyHint: bucket !== 'idle' ? dashboardPhaseHint(p) : ''
                        };
                    });

                    const sumChAccurate = sorted.reduce((acc, n) => {
                        const p = progressById[n.id];
                        const fromProg = p ? Number(p.chapterCount || 0) : 0;
                        return acc + Math.max(fromProg, novelChapterCountFromRow(n));
                    }, 0);
                    if (scanIds.length) {
                        dashboardSummary.value.totalChapters = sumChAccurate;
                        dashboardSummary.value.totalWordsEst = estimateWordsFromChapters(sumChAccurate);
                    }
                };

                const refreshDashboardOverview = async () => {
                    loading.dashboard = true;
                    try {
                        await fetchNovels();
                        await scanDashboardProgress();
                    } catch (e) {
                        addLog(`主页统计刷新失败: ${e.message}`, 'warning');
                    } finally {
                        loading.dashboard = false;
                    }
                };

                const handleViewChange = (index) => {
                    activeView.value = index;
                    if (index === 'log' && logContainerRef.value) {
                        setTimeout(() => { logContainerRef.value.scrollTop = logContainerRef.value.scrollHeight; }, 50);
                    }
                    if (index === 'dashboard') {
                        refreshDashboardOverview();
                    }
                };

                const libraryCardAccent = (index) => {
                    const hues = ['accent-a', 'accent-b', 'accent-c', 'accent-d'];
                    return hues[index % hues.length];
                };

                const openNovelFromDashboard = async (item) => {
                    if (!item?.id) return;
                    activeView.value = 'home';
                    const row = novels.value.find((n) => n.id === item.id);
                    if (row) await selectNovel(row);
                    else {
                        await fetchNovels();
                        const again = novels.value.find((n) => n.id === item.id);
                        if (again) await selectNovel(again);
                        else showMessage('未找到该作品，请先在作品库刷新列表', 'warning');
                    }
                };

                const filteredLogs = computed(() => {
                    if (logFilter.value === 'all') return logs.value;
                    if (logFilter.value === 'repair') {
                        return logs.value.filter(log => {
                            const message = String(log.message || '');
                            return message.includes('角色修复') || message.includes('角色强制重建') || message.includes('/characters/repair');
                        });
                    }
                    return logs.value.filter(log => log.type === logFilter.value);
                });
                const currentNovelSettingText = computed(() => currentNovel.value?.generationSetting || outlineInfo.value.generationSetting || '');
                /** GET /api/novel/{id} 的 narrativeCarryover（总表 §2） */
                const narrativeCarryoverDisplay = computed(() => {
                    const v = currentNovel.value?.narrativeCarryover;
                    if (v == null || v === '') return '';
                    if (typeof v === 'string') return v.trim() || '';
                    try {
                        return JSON.stringify(v, null, 2);
                    } catch {
                        return String(v);
                    }
                });
                /** GET .../narrative-state（M9）展示用 */
                const narrativeStateJsonText = computed(() => {
                    const b = narrativeStateBundle.value;
                    if (!b.loaded) return '';
                    if (b.narrativeState != null) {
                        try {
                            return JSON.stringify(b.narrativeState, null, 2);
                        } catch {
                            return String(b.narrativeState);
                        }
                    }
                    if (b.narrativeStateRaw) return String(b.narrativeStateRaw);

                });
                const bookMetaDisplayPlatform = computed(() => {
                    const s = currentNovel.value?.serializationPlatform;
                    return s != null && String(s).trim() ? String(s).trim() : '';
                });
                const bookMetaDisplayNote = computed(() => {
                    const s = currentNovel.value?.creatorNote;
                    return s != null && String(s).trim() ? String(s).trim() : '';
                });
                const bookMetaNoteShort = computed(() => {
                    const t = bookMetaDisplayNote.value;
                    if (!t) return '';
                    return t.length > 80 ? `${t.slice(0, 80)}…` : t;
                });
                /** 文档：路线图末章下限须 ≥ 细纲章数 + 15；与服务端 minRoadmapChaptersMin 取较大值 */
                const outlineRoadmapInputMin = computed(() => {
                    const o = outlinePlanDefaults.value;
                    const serverMin = o.minRoadmapChaptersMin != null && Number.isFinite(Number(o.minRoadmapChaptersMin))
                        ? Number(o.minRoadmapChaptersMin)
                        : null;
                    const dp = form.value.outlineDetailedPrefixChapters;
                    const detailNum = dp != null && dp !== '' ? Number(dp) : NaN;
                    const fromDetail = Number.isFinite(detailNum) ? detailNum + 15 : null;
                    const vals = [serverMin, fromDetail, 30].filter((v) => v != null && Number.isFinite(v));
                    return vals.length ? Math.max(...vals) : 30;
                });
                const outlineRegenerateRoadmapMin = computed(() => {
                    const o = outlinePlanDefaults.value;
                    const serverMin = o.minRoadmapChaptersMin != null && Number.isFinite(Number(o.minRoadmapChaptersMin))
                        ? Number(o.minRoadmapChaptersMin)
                        : null;
                    const dp = outlineRegenerateForm.value.outlineDetailedPrefixChapters;
                    const detailNum = dp != null && dp !== '' ? Number(dp) : NaN;
                    const fromDetail = Number.isFinite(detailNum) ? detailNum + 15 : null;
                    const vals = [serverMin, fromDetail, 30].filter((v) => v != null && Number.isFinite(v));
                    return vals.length ? Math.max(...vals) : 30;
                });
                const outlineRegenerateTimeoutMinutes = computed(() => Math.max(1, Math.round(CONFIG.OUTLINE_REGENERATE_TIMEOUT_MS / 60000)));
                const chapterSettingPreview = computed(() => {
                    const text = (currentChapter.value?.generationSetting || '').replace(/\s+/g, ' ').trim();
                    if (!text) return '';
                    return text.length > 60 ? `${text.slice(0, 60)}...` : text;
                });
                const failureLogs = computed(() => generationLogs.value.filter(isFailureGenerationLog));
                const currentPipelineLabel = computed(() => {
                    const value = String(currentPipeline.value || '').toLowerCase();
                    if (['light', 'light_novel', 'light-novel', 'ln'].includes(value)) return '轻小说';
                    if (['slice', 'slice_of_life', 'slice-of-life', 'daily'].includes(value)) return '日常向';
                    if (['period', 'period_drama', 'period-drama', 'age', 'era', '年代', '年代文'].includes(value)) return '年代文';
                    if (['vulgar', 'rough', '俗', '粗俗', '粗口'].includes(value)) return '粗俗风';
                    return '默认爽文';
                });
                const currentChapterSidecar = computed(() => {
                    const chapterNumber = Number(currentChapter.value?.chapterNumber);
                    if (!chapterNumber) return null;
                    return chapterSidecar.value.find(item => Number(item.chapterNumber) === chapterNumber) || null;
                });
                const currentChapterSidecarFacts = computed(() => {
                    const facts = currentChapterSidecar.value?.facts;
                    return Array.isArray(facts) ? facts : [];
                });
                const chapterSidecarPreview = computed(() => {
                    const sc = currentChapterSidecar.value;
                    if (!sc) return '';
                    const n = currentChapterSidecarFacts.value.length;
                    const anchor = String(sc.continuityAnchor || '').replace(/\s+/g, ' ').trim();
                    const parts = [];
                    if (n) parts.push(`${n} 条事实`);
                    if (anchor) parts.push(anchor.length > 36 ? `${anchor.slice(0, 36)}…` : anchor);
                    return parts.length ? parts.join(' · ') : '关键事实与衔接锚点';
                });
                const chapterParagraphs = computed(() => {
                    const raw = currentChapter.value?.content;
                    if (raw == null) return [];
                    const text = String(raw).replace(/\r\n/g, '\n').trim();
                    if (!text) return [];
                    let parts = text.split(/\n{2,}/).map((p) => p.trim()).filter(Boolean);
                    if (parts.length <= 1) {
                        const lines = text.split('\n').map((p) => p.trim()).filter(Boolean);
                        if (lines.length > 1) parts = lines;
                    }
                    return parts.length ? parts : [text];
                });
                const activeChapterWriteStatusMap = computed(() => ({
                    ...regenerationChapterStatusMap.value,
                    ...writingMonitorChapterStatusMap.value
                }));
                const runningRangeTuples = computed(() => {
                    const tuples = [];
                    const addTuple = (startRaw, endRaw) => {
                        const start = Number(startRaw);
                        const end = Number(endRaw);
                        if (!start || !end) return;
                        tuples.push([Math.min(start, end), Math.max(start, end)]);
                    };
                    const parseRange = (value) => {
                        if (value && typeof value === 'object') {
                            const start = value.start ?? value.from ?? value.rangeFrom ?? value.writeRangeFrom;
                            const end = value.end ?? value.to ?? value.rangeTo ?? value.writeRangeTo;
                            if (start != null && end != null) {
                                addTuple(start, end);
                                return;
                            }
                        }
                        const text = String(value || '').trim();
                        if (!text) return;
                        const m = text.match(/(\d+)\s*[-~～到至]+\s*(\d+)/);
                        if (!m) return;
                        addTuple(m[1], m[2]);
                    };

                    addTuple(writingMonitorStatus.value?.writeRangeFrom, writingMonitorStatus.value?.writeRangeTo);
                    const ranges = Array.isArray(regenerationTaskStatus.value?.runningRanges)
                        ? regenerationTaskStatus.value.runningRanges
                        : [];
                    ranges.forEach(parseRange);
                    const volatileRanges = Array.isArray(writingMonitorStatus.value?.volatileGuardRanges)
                        ? writingMonitorStatus.value.volatileGuardRanges
                        : [];
                    volatileRanges.forEach(parseRange);

                    return tuples;
                });
                const primaryRunningRangeTuple = computed(() => {
                    const tuples = runningRangeTuples.value;
                    if (!tuples.length) return null;
                    return tuples.reduce((best, cur) => {
                        const bestSpan = best[1] - best[0];
                        const curSpan = cur[1] - cur[0];
                        return curSpan > bestSpan ? cur : best;
                    }, tuples[0]);
                });
                const isChapterInRunningRange = (chapter) => {
                    const chapterNumber = Number(chapter?.chapterNumber);
                    if (!chapterNumber) return false;
                    return runningRangeTuples.value.some(([start, end]) => chapterNumber >= start && chapterNumber <= end);
                };
                const currentChapterRewriteStatus = computed(() => {
                    const chapterNumber = Number(currentChapter.value?.chapterNumber);
                    if (!chapterNumber) return '';
                    return String(activeChapterWriteStatusMap.value[chapterNumber] || '');
                });
                const chapterRewriteProgressText = computed(() => {
                    const rangeTuple = primaryRunningRangeTuple.value;
                    if (!rangeTuple) return '';
                    const [start, end] = rangeTuple;
                    const cursor = Number(writingMonitorStatus.value?.writeCursorChapter);
                    if (cursor) return `区间 ${start}-${end}，当前进行到第 ${cursor} 章`;
                    return `区间 ${start}-${end} 正在处理中`;
                });
                const getWriteTone = (value) => {
                    const text = String(value || '').toLowerCase();
                    if (!text) return 'generic';
                    if (/queue|pending|排队/.test(text)) return 'queue';
                    if (/continu|续写/.test(text)) return 'continue';
                    if (/regenerat|rewrit|重写|重生/.test(text)) return 'rewrite';
                    return 'generic';
                };
                /** 仅当处于重生/区间重写相关流程时，才使用「已重写」与区间光标规则（与续写完全分开） */
                const isChapterListRewriteWorkflow = () => {
                    const phase = String(writingMonitorStatus.value?.writePhase || '').toUpperCase();
                    if (/CONTINUE|AUTO_CONTINUE/.test(phase)) return false;
                    if (/REGENERAT|REWRIT|RANGE/.test(phase)) return true;
                    const rt = regenerationTaskStatus.value;
                    if (rt?.hasRunningTask && Array.isArray(rt.runningRanges) && rt.runningRanges.length > 0) return true;
                    return false;
                };
                /** 章节列表展示：续写显示章节名；仅重生流程下「已重写」显示章节名；「正在重写」「待重写」隐藏章节名并显示提示 */
                const getChapterListWriteSlot = (chapter) => {
                    const n = Number(chapter?.chapterNumber);
                    if (!n) return 'normal';
                    const raw = String(activeChapterWriteStatusMap.value[n] || '').trim();
                    const tone = getWriteTone(raw);
                    if (raw && tone === 'continue') return 'continue_marked';

                    const rewriteFlow = isChapterListRewriteWorkflow();
                    // 避免续写管线把章节标成「已重写」：仅重生流程下认「已重写」文案，且排除带「续写」字样的混合描述
                    if (rewriteFlow && raw && /已重写/.test(raw) && !/续写/.test(raw)) return 'rewrite_done';

                    const inRange = isChapterInRunningRange(chapter);
                    const cursor = Number(writingMonitorStatus.value?.writeCursorChapter);

                    if (rewriteFlow && inRange && cursor && n < cursor) return 'rewrite_done';
                    if (rewriteFlow && inRange && cursor && n === cursor) return 'rewrite_active';
                    if (rewriteFlow && inRange && (!cursor || n > cursor)) return 'rewrite_pending';

                    if (raw && tone === 'rewrite') return 'rewrite_active';
                    if (raw && tone === 'queue') return 'rewrite_pending';
                    if (raw && /重写|重生|rewrit|regenerat/i.test(raw)) return 'rewrite_active';
                    if (raw && /待处理|等待|排队|pending/i.test(raw)) return 'rewrite_pending';

                    return 'normal';
                };
                const chapterListShowsTitle = (chapter) => {
                    const s = getChapterListWriteSlot(chapter);
                    return s === 'normal' || s === 'continue_marked' || s === 'rewrite_done';
                };
                const chapterListRowIsCompact = (chapter) => !chapterListShowsTitle(chapter);
                const chapterListHintShort = (chapter) => {
                    const s = getChapterListWriteSlot(chapter);
                    if (s === 'rewrite_active') return '正在重写…';
                    if (s === 'rewrite_pending') return '待重写';
                    return '';
                };
                const chapterListHintText = (chapter) => {
                    const s = getChapterListWriteSlot(chapter);
                    if (s === 'rewrite_active') {
                        return '本章正在重写，章节名暂时隐藏；完成后将恢复显示，内容也会在任务结束后更新。';
                    }
                    if (s === 'rewrite_pending') {
                        return '本章在重生区间内尚未轮到，为减少干扰不显示章节名；处理顺序按区间从小到大，请关注顶部写作进度。';
                    }
                    return '';
                };
                const getChapterListBusyTone = (chapter) => {
                    const s = getChapterListWriteSlot(chapter);
                    if (s === 'rewrite_pending') return 'warning';
                    if (s === 'rewrite_active') return 'danger';
                    return 'info';
                };
                const writingMonitorToneClass = computed(() => {
                    const tone = getWriteTone(writingMonitorStatus.value?.writePhase || writingMonitorToolbarText.value);
                    if (tone === 'rewrite') return 'tone-rewrite';
                    if (tone === 'continue') return 'tone-continue';
                    if (tone === 'queue') return 'tone-queue';
                    return 'tone-generic';
                });
                const writingMonitorToolbarText = computed(() => {
                    const wm = writingMonitorStatus.value || {};
                    const hasActiveMarks = Object.keys(activeChapterWriteStatusMap.value).length > 0;
                    if (!wm.isBusyPersisted && !hasActiveMarks && runningRangeTuples.value.length === 0) return '';
                    const phaseLabel = formatWritePhaseLabel(wm.writePhase);
                    const rangeTuple = primaryRunningRangeTuple.value;
                    const cursor = Number(wm.writeCursorChapter);
                    if (rangeTuple) {
                        const [start, end] = rangeTuple;
                        if (cursor) return `${phaseLabel} · ${start}-${end}（进行到 ${cursor}）`;
                        return `${phaseLabel} · ${start}-${end}`;
                    }
                    if (cursor) return `${phaseLabel} · 进行到第 ${cursor} 章`;
                    const activeCount = Object.keys(activeChapterWriteStatusMap.value).length;
                    if (activeCount > 0) return `${phaseLabel} · ${activeCount} 章处理中`;
                    return phaseLabel;
                });
                const formatCharacter = (character) => character.profile || character.description || character.setting || JSON.stringify(character);
                const getCharacterSections = (character) => {
                    const raw = String(character?.profileContent || character?.profile || character?.description || character?.setting || '').trim();
                    if (!raw) return [];
                    const lines = raw.split('\n').map(line => line.trim()).filter(Boolean);
                    const sections = [];
                    lines.forEach(line => {
                        const match = line.match(/^([^:：]{1,12})[:：]\s*(.+)$/);
                        if (match) {
                            sections.push({ label: match[1].trim(), content: match[2].trim() });
                        } else if (sections.length) {
                            sections[sections.length - 1].content += ` ${line}`;
                        }
                    });
                    return sections;
                };
                const escapeHtml = (value) => String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
                const applyInlineMarkdown = (text) => escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                const buildOutlineMeta = (rawText) => {
                    const raw = String(rawText || '').trim();
                    if (!raw) return { html: '', toc: [] };
                    const lines = raw.split('\n');
                    const toc = [];
                    const headingCounters = {};
                    const html = [];
                    let inUl = false;
                    let inOl = false;
                    let tableBuffer = [];

                    const closeLists = () => {
                        if (inUl) { html.push('</ul>'); inUl = false; }
                        if (inOl) { html.push('</ol>'); inOl = false; }
                    };
                    const flushTable = () => {
                        if (tableBuffer.length === 0) return;
                        const rows = tableBuffer
                            .map(line => line.trim())
                            .filter(line => line.startsWith('|') && line.endsWith('|') && !/^\|[-:\s|]+\|$/.test(line));
                        if (rows.length) {
                            html.push('<div class="outline-table-wrap"><table class="outline-table"><tbody>');
                            rows.forEach((row, idx) => {
                                const cells = row.slice(1, -1).split('|').map(cell => applyInlineMarkdown(cell.trim()));
                                html.push('<tr>');
                                cells.forEach(cell => {
                                    html.push(idx === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`);
                                });
                                html.push('</tr>');
                            });
                            html.push('</tbody></table></div>');
                        }
                        tableBuffer = [];
                    };

                    lines.forEach((line) => {
                        const trimmed = line.trim();
                        const headingMatch = trimmed.match(/^(#{1,4})\s+(.+)$/);
                        const ulMatch = trimmed.match(/^[-*]\s+(.+)$/);
                        const olMatch = trimmed.match(/^(\d+)\.\s+(.+)$/);
                        const isTableLine = /^\|.+\|$/.test(trimmed);

                        if (isTableLine) {
                            closeLists();
                            tableBuffer.push(trimmed);
                            return;
                        }

                        flushTable();

                        if (!trimmed) {
                            closeLists();
                            html.push('<div class="outline-gap"></div>');
                            return;
                        }

                        if (/^---+$/.test(trimmed)) {
                            closeLists();
                            html.push('<hr class="outline-divider" />');
                            return;
                        }

                        if (headingMatch) {
                            closeLists();
                            const level = Math.min(6, headingMatch[1].length + 1);
                            const titleText = headingMatch[2].trim();
                            const slug = titleText.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '') || 'section';
                            headingCounters[slug] = (headingCounters[slug] || 0) + 1;
                            const anchorId = `outline-${slug}-${headingCounters[slug]}`;
                            html.push(`<h${level} id="${anchorId}" class="outline-h${level}">${applyInlineMarkdown(titleText)}</h${level}>`);
                            if (level <= 4) toc.push({ id: anchorId, text: titleText, level });
                            return;
                        }

                        if (ulMatch) {
                            if (inOl) { html.push('</ol>'); inOl = false; }
                            if (!inUl) { html.push('<ul class="outline-ul">'); inUl = true; }
                            html.push(`<li>${applyInlineMarkdown(ulMatch[1])}</li>`);
                            return;
                        }

                        if (olMatch) {
                            if (inUl) { html.push('</ul>'); inUl = false; }
                            if (!inOl) { html.push('<ol class="outline-ol">'); inOl = true; }
                            html.push(`<li>${applyInlineMarkdown(olMatch[2])}</li>`);
                            return;
                        }

                        closeLists();
                        html.push(`<p class="outline-p">${applyInlineMarkdown(trimmed)}</p>`);
                    });

                    closeLists();
                    flushTable();
                    return { html: html.join(''), toc };
                };

                    const code = log.code || log.errorCode;
                    const url = log.url || log.endpoint || log.api || log.path;
                    const taskId = log.taskId || log.activeTaskId;
                    const parts = [];
                    if (code) parts.push(`code: ${code}`);
                    if (url) parts.push(`url: ${url}`);
                    if (taskId) parts.push(`taskId: ${taskId}`);
                    if (message) parts.push(`message: ${message}`);
                    if (parts.length) return parts.join('\n');

                const openCreateDialog = async () => {

                        creatorNote: '',
                        writingStyleHints: emptyWritingStyleHints(),

                const getApiErrorCode = (error) => String(error?.response?.data?.code || '').toUpperCase();

                const syncBookMetaFromNovel = () => {

                const submitBookMeta = async () => {
                    if (!currentNovel.value) return;

                    try {

                        const n = currentNovel.value;
                        const nextSp = bookMetaForm.value.serializationPlatform != null ? String(bookMetaForm.value.serializationPlatform).trim() : '';
                        const nextCn = bookMetaForm.value.creatorNote != null ? String(bookMetaForm.value.creatorNote).trim() : '';
                        const prevSp = n.serializationPlatform != null ? String(n.serializationPlatform).trim() : '';
                        const prevCn = n.creatorNote != null ? String(n.creatorNote).trim() : '';
                        const body = {};
                        if (nextSp !== prevSp) body.serializationPlatform = nextSp;
                        if (nextCn !== prevCn) body.creatorNote = nextCn;
                        if (Object.keys(body).length === 0) {

                        actions.bookMetaUpdating = false;

                const submitHotMemeToggle = async () => {
                    if (!currentNovel.value) return;

                    try {
                        await axiosInstance.post(`/${currentNovel.value.id}/hot-meme`, { enabled: !!bookMetaForm.value.hotMemeEnabled });

                        actions.hotMemeUpdating = false;

                const submitWritingStyleParams = async () => {
                    if (!currentNovel.value) return;
                    const merged = validateAndMergeWritingStyleParams(
                        pipelineForm.value.writingStyleHints,
