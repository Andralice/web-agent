<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文创作台</title>
    <link rel="stylesheet" href="./node_modules/element-plus/dist/index.css" />
</head>
<body>
    <div id="app"></div>

    <script src="./node_modules/vue/dist/vue.global.prod.js"></script>
    <script src="./node_modules/element-plus/dist/index.full.min.js"></script>
    <script src="./node_modules/axios/dist/axios.min.js"></script>
    <script>
        const { createApp, ref, reactive, computed, onMounted, onBeforeUnmount } = Vue;

        const App = {
            template: `
                <div class="app-shell">
                    <header class="titlebar">
                        <div class="titlebar-left">
                            <div class="app-mark">中</div>
                            <div class="titlebar-text">
                                <div class="app-name">中文创作台</div>
                            </div>
                        </div>
                        <div class="titlebar-center">
                            <span class="current-novel-chip" v-if="currentNovel">{{ currentNovel.title }}</span>
                            <div class="service-cluster">
                                <span class="service-label">服务</span>
                                <el-button-group class="service-switch compact-service-switch">
                                    <el-button size="small" :type="!isCloudServer ? 'primary' : ''" :disabled="!isCloudServer" @click="switchToLocal">本地</el-button>
                                    <el-button size="small" :type="isCloudServer ? 'primary' : ''" :disabled="isCloudServer" @click="switchToCloud">云端</el-button>
                                </el-button-group>
                                <el-tag size="small" :type="connectionStatus.type">{{ connectionStatus.text }}</el-tag>
                                <el-button size="small" plain @click="testConnection" :loading="testing">测试</el-button>
                            </div>
                        </div>
                        <div class="titlebar-actions">
                            <button class="window-btn" @click="minimizeWindow" title="最小化">—</button>
                            <button class="window-btn" @click="maximizeWindow" title="最大化">□</button>
                            <button class="window-btn close" @click="closeWindow" title="关闭">×</button>
                        </div>
                    </header>

                    <div class="workspace">
                        <aside class="sidebar" :class="{ collapsed: sidebarCollapsed }">
                            <div class="sidebar-head" @click="toggleSidebar" title="点击收起/展开导航">
                                <div class="sidebar-logo">{{ sidebarCollapsed ? '中' : '创' }}</div>
                                <div class="sidebar-title" v-show="!sidebarCollapsed">
                                    <div class="sidebar-name">中文创作台</div>
                                    <div class="sidebar-desc">创作平台</div>
                                </div>
                            </div>
                            <el-menu class="nav-menu" :default-active="activeView" @select="handleViewChange">
                                <el-menu-item index="dashboard">
                                    <span class="nav-icon">首</span>
                                    <span class="nav-text">主页</span>
                                </el-menu-item>
                                <el-menu-item index="home">
                                    <span class="nav-icon">创</span>
                                    <span class="nav-text">创作中心</span>
                                </el-menu-item>
                                <el-menu-item index="log">
                                    <span class="nav-icon">监</span>
                                    <span class="nav-text">运行监控</span>
                                </el-menu-item>
                            </el-menu>
                        </aside>

                        <main class="content">
                            <section v-show="activeView === 'dashboard'" class="page dashboard-page">
                                <div class="dashboard-hero">
                                    <div class="hero-copy">
                                        <span class="hero-eyebrow">AI 小说创作工作台</span>
                                        <h1>把灵感推进成完整作品</h1>
                                        <p>从题材设定、大纲角色到章节续写，集中管理你的创作流程，让每一本小说都有清晰的成长路径。</p>
                                        <div class="hero-actions">
                                            <el-button type="primary" size="large" @click="openCreateDialog">新建作品</el-button>
                                            <el-button size="large" @click="activeView = 'home'">进入作品库</el-button>
                                        </div>
                                    </div>
                                    <div class="hero-card">
                                        <div class="hero-card-head">
                                            <span>创作概览</span>
                                            <el-tag size="small" :type="connectionStatus.type">{{ connectionStatus.text }}</el-tag>
                                        </div>
                                        <div class="hero-metrics">
                                            <div class="hero-metric">
                                                <strong>{{ novels.length }}</strong>
                                                <span>作品</span>
                                            </div>
                                            <div class="hero-metric">
                                                <strong>{{ currentNovel ? chapters.length : '-' }}</strong>
                                                <span>当前章节</span>
                                            </div>
                                            <div class="hero-metric">
                                                <strong>{{ isCloudServer ? '云端' : '本地' }}</strong>
                                                <span>服务</span>
                                            </div>
                                        </div>
                                        <div class="hero-flow">
                                            <div><span>1</span> 设定题材</div>
                                            <div><span>2</span> 生成大纲与角色</div>
                                            <div><span>3</span> 续写章节并导出</div>
                                        </div>
                                    </div>
                                </div>

                                <div class="dashboard-grid">
                                    <div class="dashboard-card feature-card">
                                        <span class="feature-icon">纲</span>
                                        <h3>结构化生成</h3>
                                        <p>围绕全局设定、大纲、角色和章节逐步推进，减少创作断层。</p>
                                    </div>
                                    <div class="dashboard-card feature-card">
                                        <span class="feature-icon">续</span>
                                        <h3>持续续写</h3>
                                        <p>支持单章续写和自动续写，便于快速扩展长篇内容。</p>
                                    </div>
                                    <div class="dashboard-card feature-card">
                                        <span class="feature-icon">监</span>
                                        <h3>过程可追踪</h3>
                                        <p>生成进度、失败次数和运行日志集中展示，问题更容易定位。</p>
                                    </div>
                                </div>
                            </section>

                            <section v-show="activeView === 'home'" class="page">
                                <div class="content-grid">
                                    <el-card v-if="!currentNovel" shadow="hover" class="panel library-panel">
                                        <template #header>
                                            <div class="panel-header panel-header-library">
                                                <div class="library-title-block">
                                                    <div class="library-icon">书</div>
                                                    <div class="panel-titleline">
                                                        <span class="panel-title">作品库</span>
                                                        <span class="panel-subtitle">共 {{ novels.length }} 部作品</span>
                                                    </div>
                                                </div>
                                                <div class="library-actions">
                                                    <el-button size="small" @click="fetchNovels" :loading="loading.novels">刷新</el-button>
                                                    <el-button type="primary" size="small" @click="openCreateDialog">+ 新建作品</el-button>
                                                </div>
                                            </div>
                                        </template>
                                        <div class="table-wrap">
                                            <el-table
                                                :data="novels"
                                                @row-click="selectNovel"
                                                highlight-current-row
                                                v-loading="loading.novels"
                                                empty-text="暂无作品，点击右上角新建作品"
                                                :header-cell-style="{ textAlign: 'center' }"
                                                :cell-style="{ textAlign: 'center' }"
                                                stripe>
                                                <el-table-column prop="id" label="ID" width="90" align="center" />
                                                <el-table-column prop="title" label="标题" min-width="180" show-overflow-tooltip />
                                                <el-table-column label="全局设定" min-width="260" show-overflow-tooltip>
                                                    <template #default="{ row }">
                                                        <span class="setting-preview">{{ row.generationSetting || '未设置' }}</span>
                                                    </template>
                                                </el-table-column>
                                                <el-table-column label="操作" width="100" align="center">
                                                    <template #default="{ row }">
                                                        <el-button link type="danger" size="small" @click.stop="handleDeleteNovel(row)">删除</el-button>
                                                    </template>
                                                </el-table-column>
                                            </el-table>
                                        </div>
                                    </el-card>

                                    <el-card v-else shadow="hover" class="panel panel-workbench">
                                        <template #header>
                                            <div class="panel-header panel-header-vertical">
                                                <div class="workbench-title-block">
                                                    <div class="panel-title">{{ currentNovel.title }}</div>
                                                    <div class="panel-subtitle">已生成 {{ chapters.length }} 个章节 · 支持续写、审阅与导出</div>
                                                </div>
                                                <div class="workbench-toolbar">
                                                    <div class="toolbar-row">
                                                        <el-button class="toolbar-pill" @click="backToNovelList">← 作品库</el-button>
                                                        <el-button class="toolbar-pill" @click="refreshGenerationState" :loading="loading.progress">刷新进度</el-button>
                                                        <button type="button" class="toolbar-pill" @click="openStoryInfoDialog()">
                                                            创作信息
                                                        </button>
                                                        <button type="button" class="toolbar-pill" @click="openPipelineDialog">
                                                            流水线 {{ currentPipelineLabel }}
                                                        </button>
                                                        <span v-if="writingMonitorToolbarText" :class="['toolbar-pill', 'static', writingMonitorToneClass]">{{ writingMonitorToolbarText }}</span>
                                                        <span class="toolbar-pill done static">章节 {{ generationProgress.chapterCount || chapters.length }} 章</span>
                                                        <button v-if="generationProgress.failedCount" type="button" class="toolbar-pill danger" title="点击查看失败日志" @click="openFailureLogs">失败 {{ generationProgress.failedCount }}</button>
                                                        <el-button class="toolbar-pill" @click="openContinueDialog" :loading="actions.continuing || actions.autoContinuing">续写设置</el-button>
                                                        <el-button class="toolbar-pill" @click="openRangeRegenerateDialog" :disabled="chapters.length === 0" :loading="actions.rangeRegenerating">区间重生</el-button>
                                                        <el-button class="toolbar-pill" @click="copyCurrentChapter" :disabled="!currentChapter || !currentChapter.content">复制本章</el-button>
                                                        <el-button class="toolbar-pill" @click="exportNovel" :disabled="chapters.length === 0" :loading="actions.exporting">导出 TXT</el-button>
                                                        <el-button class="toolbar-pill" @click="openQualityCenterDialog()">质量中心</el-button>
                                                        <button type="button" :class="['toolbar-pill', compactDialogMode ? 'active' : '']" @click="toggleCompactDialogMode">
                                                            紧凑模式 {{ compactDialogMode ? '开' : '关' }}
                                                        </button>
                                                        <el-button class="toolbar-pill" @click="refreshChapters" :loading="actions.refreshing">刷新章节</el-button>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>

                                        <div v-if="workbenchMode === 'chapters'" class="workbench" :style="{ gridTemplateColumns: chapterListWidth + 'px 8px minmax(0, 1fr)' }">
                                            <div class="chapter-list">
                                                <el-menu @select="handleChapterSelect" v-loading="loading.chapters" :default-active="currentChapter ? currentChapter.id.toString() : ''">
                                                    <el-empty v-if="chapters.length === 0 && !loading.chapters" description="暂无章节" :image-size="80" />
                                                    <el-menu-item v-for="c in chapters" :index="c.id.toString()" :key="c.id">
                                                        <div class="chapter-item">
                                                            <span class="chapter-number">{{ c.chapterNumber }}</span>
                                                            <span class="chapter-title">{{ c.title }}</span>
                                                            <el-tag v-if="c.generationSetting" size="small" type="warning" effect="plain">设定</el-tag>
                                                            <el-tag
                                                                v-if="isChapterRegenerating(c)"
                                                                size="small"
                                                                :type="getChapterWriteTagType(c)"
                                                                effect="light"
                                                            >{{ getChapterWriteStatusText(c) }}</el-tag>
                                                            <el-button
                                                                v-else
                                                                class="chapter-regenerate-btn"
                                                                link
                                                                type="primary"
                                                                size="small"
                                                                @click.stop="openRegenerateDialog(c)"
                                                            >重生成</el-button>
                                                        </div>
                                                    </el-menu-item>
                                                </el-menu>
                                            </div>

                                            <div class="chapter-resizer" @mousedown="startResizeChapterList" title="拖拽调整章节栏宽度"></div>

                                            <div class="reader" ref="readerRef">
                                                <div v-if="currentChapter" class="chapter-content" ref="contentRef">
                                                    <h3>{{ currentChapter.title }}</h3>
                                                    <div v-if="currentChapterRewriteStatus" class="chapter-rewrite-hint">
                                                        当前章节正在重写（{{ currentChapterRewriteStatus }}）<template v-if="chapterRewriteProgressText">，{{ chapterRewriteProgressText }}</template>，内容会在任务完成后自动更新
                                                    </div>
                                                    <div
                                                        v-if="currentChapter.generationSetting || currentChapterSidecar"
                                                        class="chapter-meta-shell"
                                                    >
                                                        <div class="chapter-meta-row">
                                                            <button
                                                                v-if="currentChapter.generationSetting"
                                                                type="button"
                                                                class="chapter-meta-chip"
                                                                :class="{ 'is-expanded': chapterSettingExpanded }"
                                                                @click="toggleChapterMetaSetting"
                                                            >
                                                                <span class="chapter-meta-chip-main">
                                                                    <span class="chapter-meta-chip-label">本章生成设定</span>
                                                                    <span
                                                                        v-if="!chapterSettingExpanded && chapterSettingPreview"
                                                                        class="chapter-meta-chip-preview"
                                                                    >{{ chapterSettingPreview }}</span>
                                                                </span>
                                                                <span class="chapter-meta-chip-tail">
                                                                    <span class="chapter-meta-chip-action">{{ chapterSettingExpanded ? '收起' : '展开' }}</span>
                                                                    <span :class="['chapter-meta-chip-caret', chapterSettingExpanded ? 'expanded' : '']">⌄</span>
                                                                </span>
                                                            </button>
                                                            <button
                                                                v-if="currentChapterSidecar"
                                                                type="button"
                                                                class="chapter-meta-chip"
                                                                :class="{ 'is-expanded': chapterSidecarExpanded }"
                                                                @click="toggleChapterMetaSidecar"
                                                            >
                                                                <span class="chapter-meta-chip-main">
                                                                    <span class="chapter-meta-chip-label">章节结构化视图</span>
                                                                    <span
                                                                        v-if="!chapterSidecarExpanded && chapterSidecarPreview"
                                                                        class="chapter-meta-chip-preview"
                                                                    >{{ chapterSidecarPreview }}</span>
                                                                </span>
                                                                <span class="chapter-meta-chip-tail">
                                                                    <span class="chapter-meta-chip-action">{{ chapterSidecarExpanded ? '收起' : '展开' }}</span>
                                                                    <span :class="['chapter-meta-chip-caret', chapterSidecarExpanded ? 'expanded' : '']">⌄</span>
                                                                </span>
                                                            </button>
                                                        </div>
                                                        <template v-if="currentChapter.generationSetting">
                                                            <div v-show="chapterSettingExpanded" class="chapter-meta-panel">
                                                                <p class="chapter-meta-panel-prose">{{ currentChapter.generationSetting }}</p>
                                                            </div>
                                                        </template>
                                                        <template v-if="currentChapterSidecar">
                                                            <div v-show="chapterSidecarExpanded" class="chapter-meta-panel">
                                                                <div class="chapter-meta-blocks">
                                                                    <div class="chapter-meta-block">
                                                                        <strong>关键事实</strong>
                                                                        <ul v-if="currentChapterSidecarFacts.length">
                                                                            <li v-for="(fact, idx) in currentChapterSidecarFacts" :key="idx">{{ fact }}</li>
                                                                        </ul>
                                                                        <p v-else class="chapter-meta-muted">暂无关键事实</p>
                                                                    </div>
                                                                    <div class="chapter-meta-block">
                                                                        <strong>衔接锚点</strong>
                                                                        <p class="chapter-meta-panel-prose">{{ currentChapterSidecar.continuityAnchor || '暂无衔接锚点' }}</p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <p>{{ currentChapter.content }}</p>
                                                </div>
                                                <div v-else class="empty-panel">
                                                    <el-empty description="选择左侧章节后即可进入审阅模式" :image-size="120">
                                                        <template #image>
                                                            <span class="empty-icon">📖</span>
                                                        </template>
                                                    </el-empty>
                                                </div>
                                            </div>
                                        </div>

                                        <div v-else-if="workbenchMode === 'outline'" class="stage-detail stage-outline">
                                            <div class="stage-detail-card">
                                                <div class="stage-detail-head">
                                                    <h3>大纲与全局设定</h3>
                                                    <el-button size="small" @click="setWorkbenchMode('chapters')">返回章节</el-button>
                                                </div>
                                                <div v-if="outlineInfo.ready || outlineInfo.description" class="stage-detail-content">
                                                    <section v-if="outlineInfo.description">
                                                        <h4>小说大纲</h4>
                                                        <div v-if="outlineToc.length" class="outline-toc">
                                                            <span class="outline-toc-title">目录导航</span>
                                                            <button
                                                                v-for="item in outlineToc"
                                                                :key="item.id"
                                                                type="button"
                                                                :class="['outline-toc-item', 'level-' + item.level]"
                                                                @click="scrollToOutlineHeading(item.id)">
                                                                {{ item.text }}
                                                            </button>
                                                        </div>
                                                        <div class="outline-rich" v-html="formatOutlineHtml(outlineInfo.description)"></div>
                                                    </section>
                                                </div>
                                                <el-empty v-else description="大纲仍在生成中，请稍后刷新" :image-size="100" />
                                            </div>
                                        </div>

                                        <div v-else-if="workbenchMode === 'characters'" class="stage-detail stage-characters">
                                            <div class="stage-detail-card">
                                                <div class="stage-detail-head">
                                                    <h3>角色设定</h3>
                                                    <el-button size="small" @click="setWorkbenchMode('chapters')">返回章节</el-button>
                                                </div>
                                                <div v-if="characters.length" class="character-grid">
                                                    <div v-for="(character, index) in characters" :key="character.id || index" class="character-card">
                                                        <h4>{{ character.name || character.characterName || '角色' + (index + 1) }}</h4>
                                                        <template v-if="getCharacterSections(character).length">
                                                            <div v-for="(section, sectionIdx) in getCharacterSections(character)" :key="section.label + sectionIdx" class="character-section">
                                                                <strong>{{ section.label }}</strong>
                                                                <p>{{ section.content }}</p>
                                                            </div>
                                                        </template>
                                                        <p v-else>{{ formatCharacter(character) }}</p>
                                                    </div>
                                                </div>
                                                <el-empty v-else description="角色设定仍在生成中，请稍后刷新" :image-size="100" />
                                            </div>
                                        </div>
                                    </el-card>
                                </div>
                            </section>

                            <section v-show="activeView === 'log'" class="page">
                                <div class="page-head page-head-tight">
                                    <div class="page-titleline">
                                        <span class="eyebrow">系统监控</span>
                                        <span class="titleline-divider"></span>
                                        <h1>运行日志</h1>
                                        <p>查看接口请求、连接状态和任务执行记录。</p>
                                    </div>
                                    <el-button size="small" type="danger" plain @click="clearLogs">清空日志</el-button>
                                </div>

                                <div class="log-toolbar">
                                    <el-button-group>
                                        <el-button size="small" @click="filterLog('all')" :type="logFilter === 'all' ? 'primary' : ''">全部</el-button>
                                        <el-button size="small" @click="filterLog('info')" :type="logFilter === 'info' ? 'primary' : ''">信息</el-button>
                                        <el-button size="small" @click="filterLog('success')" :type="logFilter === 'success' ? 'primary' : ''">成功</el-button>
                                        <el-button size="small" @click="filterLog('warning')" :type="logFilter === 'warning' ? 'primary' : ''">警告</el-button>
                                        <el-button size="small" @click="filterLog('error')" :type="logFilter === 'error' ? 'primary' : ''">错误</el-button>
                                        <el-button size="small" @click="filterLog('repair')" :type="logFilter === 'repair' ? 'primary' : ''">角色修复</el-button>
                                    </el-button-group>
                                </div>

                                <div class="log-panel" ref="logContainerRef">
                                    <div v-for="(log, index) in filteredLogs" :key="log.id || index" class="log-entry">
                                        <span class="log-time">{{ log.time }}</span>
                                        <span :class="['log-badge', 'log-' + log.type]">[{{ log.type.toUpperCase() }}]</span>
                                        <span
                                            v-if="!isExpandableLog(log.message)"
                                            class="log-message"
                                        >{{ log.message }}</span>
                                        <button
                                            v-else
                                            type="button"
                                            :class="['log-message', 'log-message-toggle', !isLogExpanded(log) ? 'collapsed' : '']"
                                            :title="isLogExpanded(log) ? '点击收起' : '点击展开完整日志'"
                                            @click="toggleLogExpanded(log)"
                                        >{{ log.message }}</button>
                                        <el-button
                                            v-if="isExpandableLog(log.message)"
                                            link
                                            size="small"
                                            class="log-expand-btn"
                                            @click="toggleLogExpanded(log)">
                                            {{ isLogExpanded(log) ? '收起' : '展开' }}
                                        </el-button>
                                    </div>
                                    <div v-if="filteredLogs.length === 0" class="log-empty">暂无日志记录</div>
                                </div>
                            </section>
                        </main>
                    </div>

                    <el-dialog v-model="dialogVisible" title="新建小说" width="560px" :close-on-click-modal="false">
                        <el-form :model="form" @submit.prevent="submitCreate">
                            <el-form-item label="小说题材" label-width="100px">
                                <el-input
                                    v-model="form.topic"
                                    placeholder="例如：赛博朋克修仙、都市异能、玄幻大陆..."
                                    maxlength="100"
                                    show-word-limit
                                    clearable
                                    @keyup.enter="submitCreate">
                                    <template #prefix>💡</template>
                                </el-input>
                            </el-form-item>
                            <el-form-item label="文风" label-width="100px">
                                <el-select v-model="form.style" placeholder="默认爽文（不选也可以）" clearable>
                                    <el-option label="默认爽文" value="" />
                                    <el-option label="轻小说" value="light" />
                                    <el-option label="日常向" value="slice" />
                                </el-select>
                            </el-form-item>
                            <el-form-item label="全局设定" label-width="100px">
                                <el-input
                                    v-model="form.generationSetting"
                                    type="textarea"
                                    :rows="5"
                                    maxlength="1000"
                                    show-word-limit
                                    placeholder="例如：主角是女高中生，世界观偏赛博朋克，主线是调查父亲失踪，文风压抑但爽点强。" />
                            </el-form-item>
                            <el-alert title="AI 将根据题材和全局设定自动生成小说大纲和前几章内容" type="info" :closable="false" show-icon />
                        </el-form>
                        <template #footer>
                            <div class="dialog-footer">
                                <el-button @click="dialogVisible = false">取消</el-button>
                                <el-button type="primary" @click="submitCreate" :loading="actions.creating" :disabled="!form.topic.trim()">{{ actions.creating ? '创作中...' : '开始创作' }}</el-button>
                            </div>
                        </template>
                    </el-dialog>

                    <el-dialog v-model="storyInfoDialogVisible" title="创作信息" width="860px" :class="['unified-dialog', compactDialogMode ? 'compact-dialog' : '']">
                        <el-tabs v-model="storyInfoTab" stretch>

                            </el-form-item>
                            <el-form-item v-if="continueForm.mode === 'continue'" label="章节号" label-width="100px">
                                <el-input-number v-model="continueForm.chapterNumber" :min="1" :precision="0" :step="1" controls-position="right" placeholder="留空=自动下一章" style="width: 100%;" />
                            </el-form-item>
                            <el-form-item v-else label="目标章数" label-width="100px">
                                <el-input-number v-model="continueForm.targetChapterCount" :min="1" :precision="0" :step="1" controls-position="right" placeholder="留空=后端默认值" style="width: 100%;" />
                            </el-form-item>
                            <el-form-item label="续写设定" label-width="100px">
                                <el-input
                                    v-model="continueForm.generationSetting"
                                    type="textarea"
                                    :rows="6"
                                    maxlength="1000"
                                    show-word-limit
                                    placeholder="例如：这一章重点写主角第一次失控，反派暂时占上风，结尾留下妹妹的线索。" />
                            </el-form-item>
                            <el-alert :title="continueForm.mode === 'auto' ? '自动续写会持续写到目标章数；目标可留空使用后端默认值' : '单章续写支持指定章节号；留空时后端会自动续写下一章'" type="info" :closable="false" show-icon />
                        </el-form>
                        <template #footer>
                            <div class="dialog-footer">

                    </el-dialog>
                </div>
            `,

            setup() {
                const ipcRenderer = window.require ? window.require('electron').ipcRenderer : null;

                const CONFIG = {
                    DEFAULT_API_BASE: 'http://localhost:8080',
                    CLOUD_API_BASE: 'http://154.8.213.134:8080',
                    API_PATH: '/api/novel',
                    STORAGE_KEY: 'apiBase',
                    REQUEST_TIMEOUT: 30000
                };

                const apiBase = ref(localStorage.getItem(CONFIG.STORAGE_KEY) || CONFIG.DEFAULT_API_BASE);
                const novels = ref([]);
                const chapters = ref([]);
                const currentNovel = ref(null);
                const currentChapter = ref(null);
                const dialogVisible = ref(false);
                const form = ref({ topic: '', generationSetting: '', style: '' });
                const continueDialogVisible = ref(false);
                const regenerateDialogVisible = ref(false);
                const failureLogDialogVisible = ref(false);
                const qualityCenterDialogVisible = ref(false);
                const qualityTab = ref('exportHealth');
                const storyInfoDialogVisible = ref(false);
                const storyInfoTab = ref('globalSetting');
                const pipelineDialogVisible = ref(false);
                const rangeRegenerateDialogVisible = ref(false);
                const continueForm = ref({ mode: 'continue', chapterNumber: null, targetChapterCount: null, generationSetting: '' });
                const regenerateForm = ref({ chapter: null, generationSetting: '' });
                const rangeRegenerateForm = ref({ startChapter: null, endChapter: null, generationSetting: '' });
                const pipelineForm = ref({ pipeline: 'power_fantasy' });
                const characterRepairForceRegenerate = ref(false);
                const characterRepairForm = ref({
                    rebuildMode: 'all',
                    targetCharacterNamesInput: '',
                    characterContextHint: '',
                    extraHint: ''
                });
                const contentRef = ref(null);
                const readerRef = ref(null);
                const logContainerRef = ref(null);
                const activeView = ref('dashboard');
                const logFilter = ref('all');
                const logs = ref([]);
                const expandedLogIds = ref(new Set());
                const sidebarCollapsed = ref(true);
                const loading = reactive({ novels: false, chapters: false, progress: false, failureLogs: false, exportHealth: false, consistencyAlerts: false, chapterFacts: false, plotSnapshots: false, regenerationTasks: false });
                const actions = reactive({ creating: false, continuing: false, autoContinuing: false, regenerating: false, rangeRegenerating: false, pipelineUpdating: false, repairingCharacters: false, exporting: false, refreshing: false });
                const testing = ref(false);
                const isCloudServer = ref(false);
                const connectionStatus = ref({ type: 'info', text: '未连接' });
                const compactDialogMode = ref(false);
                const generationProgress = ref({ outlineReady: false, charactersReady: false, chapterCount: 0, failedCount: 0, status: '未开始' });
                const outlineInfo = ref({ ready: false, description: '', generationSetting: '' });
                const characters = ref([]);
                const generationLogs = ref([]);
                const exportHealthResult = ref(null);
                const consistencyAlerts = ref([]);
                const chapterFacts = ref([]);
                const plotSnapshots = ref([]);
                const chapterSidecar = ref([]);
                const currentPipeline = ref('power_fantasy');
                const regenerationTaskStatus = ref({ novelId: null, hasRunningTask: false, runningRanges: [] });
                const regenerationChapterStatusMap = ref({});
                const writingMonitorStatus = ref({
                    novelId: null,
                    writePhase: '',
                    writeCursorChapter: null,
                    writeRangeFrom: null,
                    writeRangeTo: null,
                    activeTaskId: null,
                    activeTaskStatus: '',
                    activeTaskCurrentChapter: null,
                    isBusyPersisted: false,
                    volatileGuardRanges: [],
                    chaptersWithActiveWriteMarks: []
                });
                const writingMonitorChapterStatusMap = ref({});
                const workbenchMode = ref('chapters');
                const chapterListWidth = ref(220);
                const chapterSettingExpanded = ref(false);
                const chapterSidecarExpanded = ref(false);

                let axiosInstance = createAxiosInstance();
                let stopResizeChapterList = null;
                let progressTimer = null;
                let regenerationTaskTimer = null;
                let lastObservedChapterCount = 0;
                let logSequence = 0;

                function createAxiosInstance() {
                    const instance = axios.create({
                        baseURL: `${apiBase.value}${CONFIG.API_PATH}`,
                        timeout: CONFIG.REQUEST_TIMEOUT,
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const validateApiResult = (data) => {
                        if (!data || typeof data !== 'object') return;
                        const hasStatus = Object.prototype.hasOwnProperty.call(data, 'status');
                        const hasCode = Object.prototype.hasOwnProperty.call(data, 'code');
                        if (!hasStatus && !hasCode) return;
                        const statusOk = !hasStatus || String(data.status).toLowerCase() === 'success';
                        const codeOk = !hasCode || String(data.code).toUpperCase() === 'OK';
                        if (statusOk && codeOk) return;
                        const err = new Error(data.message || `接口返回失败: ${data.code || data.status || 'UNKNOWN'}`);
                        err.response = { data };
                        throw err;
                    };

                    instance.interceptors.request.use(config => {
                        config.metadata = { startTime: Date.now() };
                        addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                        addLog('🚀 发起请求', 'info');
                        addLog(`   方法: ${(config.method || 'GET').toUpperCase()}`, 'info');
                        addLog(`   URL: ${config.baseURL}${config.url}`, 'info');
                        addLog(`   超时: ${config.timeout}ms`, 'info');
                        if (config.data) addLog(`   请求体: ${JSON.stringify(config.data)}`, 'info');
                        addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                        return config;
                    }, error => {
                        addLog(`❌ 请求配置错误: ${error.message}`, 'error');
                        return Promise.reject(error);
                    });

                    instance.interceptors.response.use(response => {
                        const duration = Date.now() - response.config.metadata.startTime;
                        addLog('✅ 请求成功', 'success');
                        addLog(`   状态码: ${response.status} ${response.statusText}`, 'success');
                        addLog(`   耗时: ${duration}ms`, 'success');
                        addLog(`   数据大小: ${JSON.stringify(response.data).length} 字节`, 'success');
                        addLog(`   数据类型: ${Array.isArray(response.data) ? 'Array' : typeof response.data}`, 'success');
                        if (response.data) {
                            addLog(`   数据预览: ${JSON.stringify(response.data)}`, 'info');
                        }
                        validateApiResult(response.data);
                        return response;
                    }, error => {
                        const duration = error.config?.metadata ? Date.now() - error.config.metadata.startTime : 0;
                        addLog('❌ 请求失败', 'error');
                        addLog(`   耗时: ${duration}ms`, 'error');
                        if (error.code === 'ECONNABORTED') {
                            addLog('   错误类型: 超时 (Timeout)', 'error');
                            addLog(`   超时设置: ${error.config?.timeout || '未知'}ms`, 'error');
                            addLog(`   请求地址: ${error.config?.baseURL}${error.config?.url}`, 'error');
                        } else if (error.code === 'ERR_NETWORK' || (error.message || '').includes('Network Error')) {
                            addLog('   错误类型: 网络错误 (Network Error)', 'error');
                            addLog(`   请求地址: ${error.config?.baseURL}${error.config?.url}`, 'error');
                        } else if (error.response) {
                            addLog('   错误类型: HTTP 错误', 'error');
                            addLog(`   状态码: ${error.response.status} ${error.response.statusText}`, 'error');
                            addLog(`   错误详情: ${JSON.stringify(error.response.data)}`, 'error');
                        } else {
                            addLog('   错误类型: 未知错误', 'error');
                            addLog(`   错误信息: ${error.message}`, 'error');
                        }
                        addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'error');
                        return Promise.reject(error);
                    });

                    return instance;
                }

                function addLog(message, type = 'info') {
                    const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
                    logs.value.push({ id: ++logSequence, time, type, message: String(message || '') });
                    if (logs.value.length > 200) {

                const formatCharacter = (character) => character.profile || character.description || character.setting || JSON.stringify(character);
                const getCharacterSections = (character) => {
                    const raw = String(character?.profileContent || character?.profile || character?.description || character?.setting || '').trim();
                    if (!raw) return [];
                    const lines = raw.split('\n').map(line => line.trim()).filter(Boolean);
                    const sections = [];
                    lines.forEach(line => {
                        const match = line.match(/^([^:：]{1,12})[:：]\s*(.+)$/);
                        if (match) {

                };
                const escapeHtml = (value) => String(value || '')
                    .replace(/&/g, '&amp;')

                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
                const applyInlineMarkdown = (text) => escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                const buildOutlineMeta = (rawText) => {
                    const raw = String(rawText || '').trim();
                    if (!raw) return { html: '', toc: [] };
                    const lines = raw.split('\n');
                    const toc = [];
                    const headingCounters = {};
                    const html = [];
                    let inUl = false;
                    let inOl = false;
                    let tableBuffer = [];

                    const closeLists = () => {
                        if (inUl) { html.push('</ul>'); inUl = false; }
                        if (inOl) { html.push('</ol>'); inOl = false; }
                    };
                    const flushTable = () => {
                        if (tableBuffer.length === 0) return;
                        const rows = tableBuffer
                            .map(line => line.trim())
                            .filter(line => line.startsWith('|') && line.endsWith('|') && !/^\|[-:\s|]+\|$/.test(line));
                        if (rows.length) {
                            html.push('<div class="outline-table-wrap"><table class="outline-table"><tbody>');
                            rows.forEach((row, idx) => {
                                const cells = row.slice(1, -1).split('|').map(cell => applyInlineMarkdown(cell.trim()));
                                html.push('<tr>');
                                cells.forEach(cell => {
                                    html.push(idx === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`);

                            html.push('</tbody></table></div>');

                            return;

                            html.push(`<li>${applyInlineMarkdown(ulMatch[1])}</li>`);

                    });

                const fetchPlotSnapshots = async (novelId) => {

                const openPlotSnapshotsDialog = async () => {

                const refreshQualityTab = async () => {

                const openQualityCenterDialog = async (tabName = 'exportHealth') => {

                const refreshGenerationState = async () => {

                        const res = await axiosInstance.get(`/${novelId}/progress`);

                        const previousChapterCount = lastObservedChapterCount;
                        generationProgress.value = {

                            chapterCount: Number(progress.chapterCount || 0),

                            // 新协议用 generationStatus 表示业务进度，status/code 只表示接口调用结果
                            status: progress.generationStatus || progress.status || '生成中'
                        };
                        const persistedWorkbench = progress.persistedWorkbench && typeof progress.persistedWorkbench === 'object'
                            ? progress.persistedWorkbench
                            : null;
                        if (persistedWorkbench && currentNovel.value?.id === novelId) {
                            writingMonitorStatus.value = {

                                writePhase: String(persistedWorkbench.writePhase || writingMonitorStatus.value.writePhase || ''),
                                writeCursorChapter: persistedWorkbench.writeCursorChapter ?? writingMonitorStatus.value.writeCursorChapter ?? null,
                                writeRangeFrom: persistedWorkbench.writeRangeFrom ?? writingMonitorStatus.value.writeRangeFrom ?? null,
                                writeRangeTo: persistedWorkbench.writeRangeTo ?? writingMonitorStatus.value.writeRangeTo ?? null,
                                activeTaskId: progress.activeTaskId ?? writingMonitorStatus.value.activeTaskId ?? null,
                                activeTaskStatus: String(progress.activeTaskStatus ?? writingMonitorStatus.value.activeTaskStatus ?? '').trim(),

                                isBusyPersisted: typeof persistedWorkbench.isBusyPersisted === 'boolean'

                        if (generationProgress.value.outlineReady) await fetchOutline(novelId);

                        await fetchGenerationLogs(novelId);
                        const doneStatuses = ['completed', 'complete', 'done', 'finished', 'ready', 'generating_or_ready', '已完成', '完成'];
                        const failedStatuses = ['failed', 'error', '失败'];
                        const normalizedStatus = String(generationProgress.value.status || '').toLowerCase();
                        if (doneStatuses.includes(normalizedStatus) || failedStatuses.includes(normalizedStatus)) stopProgressPolling();
                    } catch (error) {
                        addLog(`刷新生成进度失败: ${error.message}`, 'error');

                const startProgressPolling = () => {

                const waitForCreatedNovel = async (existingNovelIds, createdId) => {

                const selectNovel = async (row) => {

                    await fetchPipeline(row.id);

                const refreshChapters = async () => {
                    if (!currentNovel.value) return;

                        await Promise.all([
                            fetchChapters(currentNovel.value.id),
                            fetchChapterSidecar(currentNovel.value.id)
                        ]);
                        showMessage('章节列表已刷新');

                const toggleChapterMetaSetting = () => {

                const toggleChapterMetaSidecar = () => {

                    chapterSidecarExpanded.value = next;
                    if (next) chapterSettingExpanded.value = false;

                const handleChapterSelect = (index) => {
                    const chapter = chapters.value.find(c => c.id == index);
                    if (chapter) {
                        currentChapter.value = chapter;
                        chapterSettingExpanded.value = false;
                        chapterSidecarExpanded.value = false;
                        setTimeout(() => {
                            if (readerRef.value) readerRef.value.scrollTo({ top: 0, behavior: 'auto' });
                            else if (contentRef.value) contentRef.value.scrollIntoView({ block: 'start', behavior: 'auto' });
                        }, 100);
                    }
                };

                const backToNovelList = () => {
                    stopProgressPolling();
                    stopRegenerationTaskPolling();
                    currentNovel.value = null;
                    currentChapter.value = null;
                    chapterSettingExpanded.value = false;
                    chapterSidecarExpanded.value = false;
                    chapters.value = [];
                    resetGenerationState();
                };
                const openCreateDialog = () => { form.value = { topic: '', generationSetting: '', style: '' }; dialogVisible.value = true; };

                const submitCreate = async () => {
                    if (!form.value.topic.trim()) { showMessage('请输入小说题材', 'warning'); return; }
                    actions.creating = true;
                    try {
                        const existingNovelIds = new Set(novels.value.map(n => n.id));
                        const payload = {
                            topic: form.value.topic.trim(),
                            generationSetting: form.value.generationSetting.trim()
                        };
                        const style = String(form.value.style || '').trim();
                        const createRes = style
                            ? await axiosInstance.post(`/style/${encodeURIComponent(style)}/create`, payload, { baseURL: `${apiBase.value}/api/novel-style` })
                            : await axiosInstance.post('/create', payload);
                        dialogVisible.value = false;
                        showMessage('创作任务已提交，请稍后手动刷新进度查看结果');
                        const created = createRes.data?.data || createRes.data || {};
                        const createdId = created.id || created.novelId;
                        const targetNovel = await waitForCreatedNovel(existingNovelIds, createdId);
                        if (targetNovel) await selectNovel(targetNovel);
                        else showMessage('任务已提交，暂未在列表中发现新作品，请稍后手动刷新', 'warning');
                    } catch (error) {
                        showErrorMessage(error, '创建小说失败');
                    } finally { actions.creating = false; }
                };

                const openRegenerateDialog = (chapter) => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    if (isChapterRegenerating(chapter)) { showMessage('该章节正在写作/重写流程中，暂不可重生成', 'warning'); return; }
                    regenerateForm.value = { chapter, generationSetting: chapter.generationSetting || '' };
                    regenerateDialogVisible.value = true;
                };

                const submitRegenerateChapter = async () => {
                    if (!currentNovel.value || !regenerateForm.value.chapter) { showMessage('请先选择要重新生成的章节', 'warning'); return; }
                    const chapterNumber = regenerateForm.value.chapter.chapterNumber;
                    actions.regenerating = true;
                    try {
                        const generationSetting = regenerateForm.value.generationSetting.trim();
                        const payload = generationSetting ? { generationSetting } : {};
                        await axiosInstance.post(`/${currentNovel.value.id}/chapters/${chapterNumber}/regenerate`, payload);
                        regenerateDialogVisible.value = false;
                        showMessage(`第 ${chapterNumber} 章重新生成任务已提交，请稍后手动刷新进度查看结果`);
                        await refreshGenerationState();
                    } catch (error) {
                        showErrorMessage(error, '重新生成章节失败');
                    } finally { actions.regenerating = false; }
                };

                const openRangeRegenerateDialog = () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    rangeRegenerateForm.value = { startChapter: null, endChapter: null, generationSetting: '' };
                    rangeRegenerateDialogVisible.value = true;
                    fetchRegenerationTasks(currentNovel.value.id);
                };

                const fetchRegenerationTasks = async (novelId, options = {}) => {
                    if (!novelId) return;
                    const silent = !!options.silent;
                    if (!silent) loading.regenerationTasks = true;
                    try {
                        const res = await axiosInstance.get(`/${novelId}/regeneration-tasks`);
                        const data = res.data?.data || res.data || {};
                        const nextChapterStatusMap = {};
                        const isRunningStatus = (value) => {
                            const text = String(value || '').toLowerCase();
                            if (!text) return true;
                            return /running|processing|pending|queue|rewrit|regenerat|重写|重生|处理中|排队|执行中/.test(text);
                        };
                        const markChapterRunning = (input, defaultStatus = '重写中') => {
                            const chapterNumber = Number(input?.chapterNumber ?? input?.chapter ?? input);
                            if (!chapterNumber) return;
                            const rawStatus = String(input?.status || input?.state || input?.taskStatus || defaultStatus).trim();
                            if (Object.prototype.hasOwnProperty.call(input || {}, 'running') && !input.running) return;
                            if (!isRunningStatus(rawStatus)) return;
                            nextChapterStatusMap[chapterNumber] = rawStatus || defaultStatus;
                        };
                        const statusSources = [
                            data.runningChapters,
                            data.chapters,
                            data.chapterTasks,
                            data.tasks
                        ];
                        statusSources.forEach((items) => {
                            if (Array.isArray(items)) items.forEach(item => markChapterRunning(item));
                        });
                        if (Array.isArray(data.runningChapterNumbers)) {
                            data.runningChapterNumbers.forEach(chapterNumber => markChapterRunning(chapterNumber));
                        }
                        const chapterStatusMap = data.chapterStatuses || data.chapterStatusMap || data.chapterStatus;
                        if (chapterStatusMap && typeof chapterStatusMap === 'object' && !Array.isArray(chapterStatusMap)) {
                            Object.keys(chapterStatusMap).forEach((key) => {
                                const chapterNumber = Number(key);
                                if (!chapterNumber) return;
                                const value = chapterStatusMap[key];
                                const rawStatus = typeof value === 'object'
                                    ? String(value?.status || value?.state || value?.taskStatus || '').trim()
                                    : String(value || '').trim();
                                if (!isRunningStatus(rawStatus)) return;
                                nextChapterStatusMap[chapterNumber] = rawStatus || '重写中';
                            });
                        }
                        regenerationTaskStatus.value = {
                            novelId,
                            hasRunningTask: !!data.hasRunningTask,
                            runningRanges: Array.isArray(data.runningRanges) ? data.runningRanges : []
                        };
                        const wb = data.persistedWorkbench || {};
                        if (wb && typeof wb === 'object') {
                            writingMonitorStatus.value = {
                                ...writingMonitorStatus.value,
                                novelId,
                                writePhase: String(wb.writePhase || writingMonitorStatus.value.writePhase || ''),
                                writeCursorChapter: wb.writeCursorChapter ?? writingMonitorStatus.value.writeCursorChapter ?? null,
                                writeRangeFrom: wb.writeRangeFrom ?? writingMonitorStatus.value.writeRangeFrom ?? null,
                                writeRangeTo: wb.writeRangeTo ?? writingMonitorStatus.value.writeRangeTo ?? null,
                                isBusyPersisted: typeof wb.isBusyPersisted === 'boolean' ? wb.isBusyPersisted : !!writingMonitorStatus.value.isBusyPersisted
                            };
                        }
                        regenerationChapterStatusMap.value = nextChapterStatusMap;
                    } catch (error) {
                        if (!silent) showErrorMessage(error, '获取区间重生任务状态失败');
                    } finally {
                        if (!silent) loading.regenerationTasks = false;
                    }
                };
                const formatWritePhaseLabel = (phase) => {
                    const key = String(phase || '').toUpperCase();
                    if (!key) return '写作中';
                    if (key.includes('REGENERAT')) return '重写中';
                    if (key.includes('CONTINUE')) return '续写中';
                    if (key.includes('WRIT')) return '写作中';
                    if (key.includes('QUEUE') || key.includes('PENDING')) return '排队中';
                    return key;
                };
                const fetchWritingMonitor = async (novelId, options = {}) => {
                    if (!novelId) return;
                    const silent = !!options.silent;
                    try {
                        const res = await axiosInstance.get(`/${novelId}/writing-monitor`);
                        const data = res.data?.data || res.data || {};
                        const persistedWorkbench = data.persistedWorkbench && typeof data.persistedWorkbench === 'object'
                            ? data.persistedWorkbench
                            : null;
                        const effective = persistedWorkbench || data;
                        const writePhase = String(data.writePhase || '');
                        const marks = Array.isArray(data.chaptersWithActiveWriteMarks)
                            ? data.chaptersWithActiveWriteMarks
                            : [];
                        writingMonitorStatus.value = {
                            novelId,
                            writePhase: String(effective.writePhase || writePhase || ''),
                            writeCursorChapter: effective.writeCursorChapter ?? data.writeCursorChapter ?? writingMonitorStatus.value.writeCursorChapter ?? null,
                            writeRangeFrom: effective.writeRangeFrom ?? data.writeRangeFrom ?? writingMonitorStatus.value.writeRangeFrom ?? null,
                            writeRangeTo: effective.writeRangeTo ?? data.writeRangeTo ?? writingMonitorStatus.value.writeRangeTo ?? null,
                            activeTaskId: data.activeTaskId ?? effective.activeTaskId ?? null,
                            activeTaskStatus: String(data.activeTaskStatus ?? effective.activeTaskStatus ?? '').trim(),
                            activeTaskCurrentChapter: data.activeTaskCurrentChapter ?? effective.activeTaskCurrentChapter ?? null,
                            isBusyPersisted: typeof effective.isBusyPersisted === 'boolean' ? effective.isBusyPersisted : !!data.isBusyPersisted,
                            volatileGuardRanges: Array.isArray(data.volatileGuardRanges) ? data.volatileGuardRanges : [],
                            chaptersWithActiveWriteMarks: marks
                        };
                        const nextMap = {};
                        const fallbackLabel = formatWritePhaseLabel(writingMonitorStatus.value.writePhase);
                        marks.forEach((item) => {
                            const chapterNumber = Number(item?.chapterNumber ?? item?.chapter ?? item);
                            if (!chapterNumber) return;
                            const label = String(item?.status || item?.state || item?.mark || fallbackLabel || '写作中').trim();
                            nextMap[chapterNumber] = label || '写作中';
                        });
                        writingMonitorChapterStatusMap.value = nextMap;

                        if (!silent) showErrorMessage(error, '获取写作监控状态失败');
                    }
                };
                const startRegenerationTaskPolling = (novelId) => {
                    stopRegenerationTaskPolling();

                    fetchRegenerationTasks(novelId, { silent: true });
                    fetchWritingMonitor(novelId, { silent: true });
                    regenerationTaskTimer = setInterval(() => {

                        fetchRegenerationTasks(novelId, { silent: true });
                        fetchWritingMonitor(novelId, { silent: true });

                };

                const waitForRangeRegenerationFinished = async (novelId) => {
                    for (let i = 0; i < 80; i++) {
                        await fetchRegenerationTasks(novelId);

                        await new Promise(resolve => setTimeout(resolve, 2500));

                    return false;
                };

                const submitRangeRegenerate = async () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    if (rangeRegenerateForm.value.startChapter == null || rangeRegenerateForm.value.endChapter == null) {
                        showMessage('请填写起始章节和结束章节', 'warning');
                        return;
                    }
                    actions.rangeRegenerating = true;
                    try {
                        await fetchRegenerationTasks(currentNovel.value.id);
                        if (regenerationTaskStatus.value.hasRunningTask) {
                            showMessage(`当前已有区间重生任务运行中：${regenerationTaskStatus.value.runningRanges.join(', ') || '未知区间'}`, 'warning');
                            return;
                        }
                        const payload = {
                            startChapter: Number(rangeRegenerateForm.value.startChapter),
                            endChapter: Number(rangeRegenerateForm.value.endChapter)
                        };
                        const setting = (rangeRegenerateForm.value.generationSetting || '').trim();
                        if (setting) payload.generationSetting = setting;
                        await axiosInstance.post(`/${currentNovel.value.id}/chapters/regenerate-range`, payload);
                        rangeRegenerateDialogVisible.value = false;
                        showMessage('区间重生任务已提交，正在自动跟踪任务状态');
                        const finished = await waitForRangeRegenerationFinished(currentNovel.value.id);
                        await Promise.all([
                            fetchChapters(currentNovel.value.id),
                            fetchChapterFacts(currentNovel.value.id),
                            fetchPlotSnapshots(currentNovel.value.id),
                            refreshGenerationState()
                        ]);
                        if (!finished) showMessage('区间重生仍在执行中，可稍后刷新查看最新结果', 'warning');
                    } catch (error) {
                        const errorCode = String(error?.response?.data?.code || '').toUpperCase();
                        const errorMessage = String(error?.response?.data?.message || error?.message || '');
                        const conflictDetected =
                            errorCode === 'REGENERATE_RANGE_TASK_FAILED' ||
                            /重叠|冲突|运行中|running|overlap|conflict/i.test(errorMessage);
                        if (conflictDetected) {
                            await fetchRegenerationTasks(currentNovel.value.id);
                            showMessage(`区间重生任务存在冲突，请稍后重试${regenerationTaskStatus.value.runningRanges.length ? `（当前区间：${regenerationTaskStatus.value.runningRanges.join(', ')}）` : ''}`, 'warning');
                            return;
                        }
                        showErrorMessage(error, '区间重生失败');
                    } finally {
                        actions.rangeRegenerating = false;
                    }
                };

                const openContinueDialog = () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    continueForm.value = { mode: 'continue', chapterNumber: null, targetChapterCount: null, generationSetting: '' };
                    continueDialogVisible.value = true;
                };

                const submitContinueNovel = async () => {
                    if (!currentNovel.value) { showMessage('请先选择一本小说', 'warning'); return; }
                    const mode = continueForm.value.mode;
                    if (mode === 'auto') {
                        actions.autoContinuing = true;
                        try {
                            const payload = {};
                            if (continueForm.value.targetChapterCount != null) payload.targetChapterCount = Number(continueForm.value.targetChapterCount);
                            const setting = (continueForm.value.generationSetting || '').trim();
                            if (setting) payload.generationSetting = setting;
                            await axiosInstance.post(`/${currentNovel.value.id}/auto-continue`, payload);
                            continueDialogVisible.value = false;
                            showMessage('自动续写任务已提交，请稍后手动刷新进度查看结果');
                            await refreshGenerationState();
                        } catch (error) {
                            showErrorMessage(error, '自动续写失败');
                        } finally { actions.autoContinuing = false; }
                        return;
                    }

                    actions.continuing = true;
